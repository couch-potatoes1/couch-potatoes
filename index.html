              } else if (moodClashCount > 0 && moodBoostCount === 0) {
                // Only clashing genres, no mood match — heavy penalty
                score = score * 0.1 - (moodClashCount * 10);
              }
            }

            // ── Mainstream appeal signal ──
            // For genres that can be polarizing (horror, thriller), high vote counts
            // indicate broad mainstream appeal (Jaws, Alien) vs niche appeal (Saw, Hostel)
            // This gently pushes crowd-pleasing titles up in the mix
            const polarizingGenres = [27, 53]; // horror, thriller
            const hasPolarizing = [...itemGenres].some(g => polarizingGenres.includes(g));
            if (hasPolarizing) {
              const votes = item.vote_count || 0;
              if (votes >= 5000) score += 3;       // massive mainstream hit
              else if (votes >= 2000) score += 1.5; // well-known
              else if (votes < 500) score -= 1;     // niche — slightly deprioritize
            }

            // Penalize dismissed items (shouldn't appear, but belt-and-suspenders)
            if (dismissed.has(item.id)) score -= 100;

            return score;
          };

          // ── 1. Top picks for both of you (FIRST) — Anchor + Discovery blend ──
          if (sharedGenres.length > 0 || allGenres.length > 0) {
            const genresForTopPicks = tmdbSharedGenres.length > 0 ? tmdbSharedGenres : allGenres.map(toTmdbGenre).filter(Boolean);

            // Anchor titles: well-known, acclaimed films everyone recognizes (validates the algorithm)
            const anchorResults = await discoverBoth({
              with_genres: genresForTopPicks.slice(0, 3).join("|"),
              sort_by: "vote_average.desc",
              "vote_count.gte": 2000, // well-known titles
              "vote_average.gte": 7.5,
            });

            // Discovery titles: highly rated but less mainstream — the exciting finds
            const discoveryResults = await discoverBoth({
              with_genres: genresForTopPicks.join("|"),
              sort_by: "vote_average.desc",
              "vote_count.gte": 200,
              "vote_count.lte": 3000,
              "vote_average.gte": 7.0,
            }, {}, 3);

            // Popular & trending within their genres — the "everyone's talking about it" picks
            const trendingGenre = await discoverBoth({
              with_genres: genresForTopPicks.slice(0, 2).join("|"),
              sort_by: "popularity.desc",
              "vote_count.gte": 500,
              "vote_average.gte": 6.5,
            }, {}, 3);

            // Filter all pools
            let anchors = filterAnime(anchorResults).filter(passesDealbreakers).filter(passesMoodFilter);
            let discoveries = filterAnime(discoveryResults).filter(passesDealbreakers).filter(passesMoodFilter);
            let trending = filterAnime(trendingGenre).filter(passesDealbreakers).filter(passesMoodFilter);

            // Score all
            anchors.sort((a, b) => scoreForCouple(b) - scoreForCouple(a));
            discoveries.sort((a, b) => scoreForCouple(b) - scoreForCouple(a));
            trending.sort((a, b) => scoreForCouple(b) - scoreForCouple(a));

            // Interleave: anchor, discovery, trending, anchor, discovery, trending...
            // This creates a rhythm of "oh I know that one" + "ooh what's this?" + "oh that's buzzy"
            const blended = [];
            const usedIds = new Set();
            const addUnique = (item) => {
              if (!usedIds.has(item.id) && !dismissed.has(item.id)) {
                usedIds.add(item.id);
                blended.push(item);
              }
            };

            const maxItems = 40;
            let ai = 0, di = 0, ti = 0;
            while (blended.length < maxItems) {
              let added = false;
              // Anchor slot
              while (ai < anchors.length && usedIds.has(anchors[ai].id)) ai++;
              if (ai < anchors.length) { addUnique(anchors[ai++]); added = true; }
              // Discovery slot
              while (di < discoveries.length && usedIds.has(discoveries[di].id)) di++;
              if (di < discoveries.length) { addUnique(discoveries[di++]); added = true; }
              // Trending slot
              while (ti < trending.length && usedIds.has(trending[ti].id)) ti++;
              if (ti < trending.length) { addUnique(trending[ti++]); added = true; }
              if (!added) break;
            }

            const topPicks = dedup(blended);
            if (topPicks.length >= 2) {
              const isSoloRun = !(profile2.genres && profile2.genres.length > 0);
              cats.push({ title: isSoloRun ? `Top picks for ${profile1.name || "you"}` : "Top picks for both of you", icon: "", items: topPicks });
            }
          }

          // ── 2. Shared 2-genre blend — focuses on top 2 shared genres ──
          // Takes only the strongest 2 shared genres and blends them into one curated row
          // with a natural-sounding title
          {
            const genresToBlend = sharedGenres.slice(0, 2);
            if (genresToBlend.length > 0) {
              const genreLabels = genresToBlend.map(gid => GENRE_PLURAL[gid] || (genreMap[gid] || "").toLowerCase()).filter(Boolean);
              // Build a fun, concise title from genre labels
              // Use varied prefixes so it doesn't feel formulaic
              const isSoloRun = !(profile2.genres && profile2.genres.length > 0);
              const blendPrefixes = isSoloRun ? [
                labels => `Because you love ${labels}`,
                labels => `More ${labels} for you`,
                labels => `${labels[0].toUpperCase() + labels.slice(1)} you'll dig`,
              ] : [
                labels => `Because you both love ${labels}`,
                labels => `More ${labels} for you two`,
                labels => `${labels[0].toUpperCase() + labels.slice(1)} you'll both dig`,
              ];
              const prefix = blendPrefixes[Math.floor(Math.random() * blendPrefixes.length)];
              let labelStr;
              if (genreLabels.length === 1) labelStr = genreLabels[0];
              else if (genreLabels.length === 2) labelStr = `${genreLabels[0]} and ${genreLabels[1]}`;
              else labelStr = `${genreLabels.slice(0, -1).join(", ")}, and ${genreLabels[genreLabels.length - 1]}`;
              const blendTitle = prefix(labelStr);

              // Fetch from each genre with different strategies, then blend
              const blendedResults = [];
              const strategies = [
                { sort_by: "vote_average.desc", "vote_count.gte": 300 },
                { sort_by: "popularity.desc", "vote_count.gte": 100 },
                { sort_by: "revenue.desc", "vote_count.gte": 50 },
              ];
              for (let gi = 0; gi < genresToBlend.length; gi++) {
                const gid = genresToBlend[gi];
                const tmdbGid = toTmdbGenre(gid);
                if (!tmdbGid) continue;
                const extraParams = gid === 99916 ? { with_original_language: "ja" }
                  : gid === 99917 ? { without_original_language: "en" } : {};
                const strategy = strategies[gi % strategies.length];
                let results;
                if (gid === 99917) {
                  results = await discoverBoth({ sort_by: "vote_average.desc", "vote_count.gte": 300, without_original_language: "en" }, {}, 3);
                } else {
                  results = await discoverBoth({ with_genres: String(tmdbGid), ...strategy, ...extraParams }, {}, 3);
                }
                if (gid === 16 && !wantsAnime) results = results.filter(r => r.original_language !== "ja");
                if (gid === 99916) results = results.filter(r => r.original_language === "ja");
                if (gid !== 16 && gid !== 99916 && gid !== 99917) results = filterAnime(results);
                results = results.filter(passesDealbreakers).filter(passesMoodFilter);
                blendedResults.push(...results);
              }
              // Score and interleave — couple score + quality
              blendedResults.sort((a, b) => {
                const scoreA = scoreForCouple(a) + (a.vote_average || 0);
                const scoreB = scoreForCouple(b) + (b.vote_average || 0);
                return scoreB - scoreA;
              });
              const blendDeduped = dedup(blendedResults.slice(0, 40));
              if (blendDeduped.length >= 2) {
                cats.push({ title: blendTitle, icon: "", items: blendDeduped });
              }
            }
          }

          // ── SOLO ONLY: "Because you loved X" rows using TMDB's recommendations + similar
          // endpoints on the user's actual favorites. This is by far the highest-signal row
          // possible in solo mode — TMDB knows which titles are genuinely similar. Build up
          // to 2 rows from the top 2 favorites.
          //
          // Strategy: fetch BOTH /recommendations AND /similar (two different TMDB signals),
          // pull multiple pages, merge + dedup, then apply user filters. Only show a row if
          // we have at least 8 items after filtering — otherwise it looks sparse.
          const MIN_SIMILAR_ROW_SIZE = 8;
          if (isSoloRun && profile1.favorites && profile1.favorites.length > 0) {
            const topFavs = profile1.favorites.slice(0, 2);
            for (const fav of topFavs) {
              try {
                const favMediaType = fav.media_type || (fav.first_air_date ? "tv" : "movie");
                // Pull from both endpoints, 2 pages each = up to ~80 candidates
                const fetches = [
                  tmdb(`/${favMediaType}/${fav.id}/recommendations`, apiKey, { page: 1 }).catch(() => null),
                  tmdb(`/${favMediaType}/${fav.id}/recommendations`, apiKey, { page: 2 }).catch(() => null),
                  tmdb(`/${favMediaType}/${fav.id}/similar`, apiKey, { page: 1 }).catch(() => null),
                  tmdb(`/${favMediaType}/${fav.id}/similar`, apiKey, { page: 2 }).catch(() => null),
                ];
                const results = await Promise.all(fetches);
                let merged = [];
                for (const r of results) {
                  if (r?.results) {
                    merged.push(...r.results.map(m => ({ ...m, media_type: favMediaType })));
                  }
                }
                // Dedup by id before filtering
                const seen = new Set();
                merged = merged.filter(m => {
                  if (seen.has(m.id)) return false;
                  seen.add(m.id);
                  return true;
                });
                // Apply user filters
                let similar = filterAnime(merged).filter(passesDealbreakers).filter(passesMoodFilter);
                similar = similar.filter(item => {
                  const y = parseInt((item.release_date || item.first_air_date || "").slice(0, 4));
                  if (!y || isNaN(y)) return true;
                  return y >= minYear && y <= maxYear;
                });
                similar.sort((a, b) => scoreForCouple(b) - scoreForCouple(a));
                const similarDeduped = dedup(similar.slice(0, 25));
                if (similarDeduped.length >= MIN_SIMILAR_ROW_SIZE) {
                  const favTitle = fav.title || fav.name;
                  cats.push({ title: `Because you loved ${favTitle}`, icon: "", items: similarDeduped });
                }
              } catch (e) {
                console.warn("similar fetch failed for", fav.id, e);
              }
            }
          }

          // ── 3. Personal bridge — one person's genre × the other's taste ──
          // The magic: take a genre unique to person A, then find titles in that genre
          // that ALSO match one of person B's genres. E.g., Alex loves thrillers,
          // Chris loves comedy → fetch thriller-comedies. This creates genuinely
          // unique crossover results no other row produces.
          {
            const p1All = profile1.genres;
            const p2All = profile2.genres;
            const p1Unique = p1All.filter(g => !p2All.includes(g));
            const p2Unique = p2All.filter(g => !p1All.includes(g));

            // Pick which person's unique genre to start from
            let bridgeFromGenre = null; // the unique genre (person A's territory)
            let bridgeToGenres = [];    // the other person's genres to bridge into
            let fromName = "";
            let toName = "";

            if (p1Unique.length > 0 || p2Unique.length > 0) {
              let chosenPerson;
              if (p1Unique.length > 0 && p2Unique.length > 0) {
                chosenPerson = Math.random() < 0.5 ? 1 : 2;
              } else {
                chosenPerson = p1Unique.length > 0 ? 1 : 2;
              }

              const personUnique = chosenPerson === 1 ? p1Unique : p2Unique;
              const otherPersonGenres = chosenPerson === 1 ? p2All : p1All;
              fromName = (chosenPerson === 1 ? profile1.name : profile2.name) || `Person ${chosenPerson}`;

            [...new Set([...(profile1.pacePrefs || []), ...(profile2.pacePrefs || [])])].forEach(pid => {
              const pm = PACE_GM[pid]; if (!pm) return;
              for (const g of ig) { if (pm.boost.includes(g)) s += 1; if (pm.penalize.includes(g)) s -= 0.5; }
            });
            // Vibe fingerprint
            if (hV1 || hV2) {
              let vb = 0;
              for (const g of ig) (VIBE_GENRE_MAP[g] || []).forEach(vi => {
                if (hV1 && vp1[vi]) vb += Math.min(vp1[vi], 3) * 1.5;
                if (hV2 && vp2[vi]) vb += Math.min(vp2[vi], 3) * 1.5;
              });
              s += vb;
            }
            // Mood (dominant signal)
            if (fbMoods.length > 0) {
              let bc = 0, cc = 0;
              fbMoods.forEach(mid => {
                const mg = MOOD_GENRES[mid]; if (!mg) return;
                for (const g of ig) {
                  if (mg.boost.includes(g)) bc++;
                  if (mg.clashing.includes(g)) cc++;
                  if (mg.alwaysExclude?.includes(g)) s -= 200;
                }
              });
              if (bc > 0 && cc === 0) s += bc * 4;
              else if (bc > 0 && cc > 0) s += (bc * 3) - (cc * 2);
              else if (cc > 0 && bc === 0) s = s * 0.1 - (cc * 10);
            }
            // Mainstream appeal for polarizing genres
            const pol = [27, 53];
            if ([...ig].some(g => pol.includes(g))) {
              const vc = item.vote_count || 0;
              if (vc >= 5000) s += 3; else if (vc >= 2000) s += 1.5; else if (vc < 500) s -= 1;
            }
            if (dismissed.has(item.id)) s -= 100;
            return s;
          };

          // Filter dealbreakers + dedup against existing recommendation rows
          const existingIds = new Set(categories.flatMap(c => c.items).map(i => i.id));
          const filtered = merged.filter(i => fbPassesDealbreakers(i) && !existingIds.has(i.id));
          // Sort: search hits first (intent-matched), discover second.
          // Within each group, couple score is a light tiebreaker.
          const scored = filtered.map(item => ({ ...item, _fbScore: fbScore(item) }));
          const searchHits = scored.filter(i => i._isSearchHit).sort((a, b) => b._fbScore - a._fbScore);
          const discoverHits = scored.filter(i => !i._isSearchHit).sort((a, b) => b._fbScore - a._fbScore);
          const scored_final = [...searchHits, ...discoverHits];

          if (scored_final.length > 0) {
            const rawLabel = parsed.rowLabel || "Based on your request";
            const toSentence = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
            setFeedbackRow({ title: toSentence(rawLabel), items: scored_final.slice(0, 20) });
            // Scroll the result row into view after render
            setTimeout(() => {
              const el = document.getElementById('feedback-result-row');
              if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
            }, 150);
          } else {
            setFeedbackRow({ title: "No matches found", items: [] });
          }
        } catch (e) {
          console.error("Feedback search error:", e);
          setFeedbackRow({ title: "Something went wrong", items: [] });
        }
        setFeedbackLoading(false);
      };

      const handleDismiss = (itemId) => {
        setDismissed(prev => new Set([...prev, itemId]));

          ...cat,
          items: cat.items.filter(item => item.id !== itemId)
        })));
        setToastMsg("Item dismissed");
        setTimeout(() => setToastMsg(""), 2000);
      };

      const handleNah = (partnerIdx, itemId) => {
        setNah(prev => {
          const next = [...prev];
          const s = new Set(next[partnerIdx]);
          if (s.has(itemId)) s.delete(itemId);
          else s.add(itemId);
          next[partnerIdx] = s;
          // If BOTH partners said nah, auto-dismiss
          const otherIdx = partnerIdx === 0 ? 1 : 0;
          if (s.has(itemId) && prev[otherIdx].has(itemId)) {
            setTimeout(() => { handleDismiss(itemId); setSelectedMovie(null); }, 400);
          }
          return next;

            const householdId = (() => {
              try {
                const existing = localStorage.getItem("cp_householdId");
                if (existing) return existing;
                const fresh = "cp_" + Math.random().toString(36).slice(2, 8) + Math.random().toString(36).slice(2, 6);
                localStorage.setItem("cp_householdId", fresh);
                return fresh;
              } catch { return "cp_demo"; }
            })();
            // Build a shareUrl that actually loads THIS app on the partner's device.
            // Using window.location.origin fails on file:// contexts (origin is literally "file://"),

            // pathname (so file://... or https://... both work) and append ?join={id} so the

            const shareUrl = (() => {
              try {
                if (typeof window === "undefined" || !window.location) return `https://couchpotatoes.app/?join=${householdId}`;

                </button>
                <button onClick={() => goTo(S.SESSION_PREFS)} className="py-3 px-4 bg-gray-800 border border-gray-700 rounded-xl text-sm active:scale-95 text-gray-300 flex items-center gap-1.5">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707"/><circle cx="12" cy="12" r="4"/></svg>
                  Tonight
                </button>
              </div>
            </div>
          )}

          {/* ═══ DETAIL SHEET ═══ */}
          {selectedMovie && (
            <DetailSheet
              item={selectedMovie}
              apiKey={apiKey}
              genreMap={genreMap}
              onClose={() => setSelectedMovie(null)}
              profile1={profile1} profile2={profile2}
              seen={seen} toggleSeen={toggleSeen}
              onDismiss={handleDismiss} onLike={handleLike} liked={liked}
              onLove={handleLove} loved={loved}
              onNah={handleNah} nah={nah}
              tasteDNA1={tasteDNA1} tasteDNA2={tasteDNA2}
              watchlist={watchlist} toggleWatchlist={toggleWatchlist}
              anthropicKey={anthropicKey}
            />
          )}

          {/* ═══ WATCHLIST VIEW ═══ */}
          {showWatchlist && (
            <div className="fixed inset-0 z-40 flex flex-col md:max-w-[500px] md:ml-auto md:right-0">
              <div className="absolute inset-0 bg-[#0C0A14]" />
              <div className="relative flex-1 overflow-y-auto">
                <div className="sticky top-0 bg-[#0C0A14]/95 backdrop-blur-md z-10 px-5 pt-5 pb-3 flex items-center justify-between">
                  <div>
                    <h2 className="text-xl font-bold text-white">Watch Later</h2>
                    <p className="text-xs text-gray-500">{watchlist.size} saved</p>
                  </div>
                  <button onClick={() => setShowWatchlist(false)} className="text-gray-500 hover:text-white transition-colors p-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                  </button>
                </div>
                <div className="px-5 pb-8">
                  {watchlist.size === 0 ? (
                    <div className="flex flex-col items-center justify-center py-20 text-center">
                      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="text-gray-600 mb-4"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                      <p className="text-gray-500 text-sm">Nothing saved yet</p>
                      <p className="text-gray-600 text-xs mt-1">Browse and bookmark movies you want to watch!</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-3 gap-3">
                      {[...watchlist].map(id => {
                        const wItem = watchlistItems[id];
                        if (!wItem) return null;
                        return (
                          <div key={id} className="relative group">
                            <button onClick={() => { setShowWatchlist(false); setSelectedMovie(wItem); try { window.history.pushState({ overlay: "detail" }, ""); } catch {} }}
                              className="w-full rounded-xl overflow-hidden shadow-lg shadow-black/40 transition-transform active:scale-95">
                              <div style={{ aspectRatio: "2/3" }}>
                                {wItem.poster_path ? (
                                  <img src={`https://image.tmdb.org/t/p/w342${wItem.poster_path}`} alt="" className="w-full h-full object-cover" />
                                ) : (
                                  <div className="w-full h-full bg-gradient-to-br from-orange-950/50 via-rose-950/30 to-gray-900 flex items-center justify-center">
                                    <span className="text-white font-black text-lg opacity-80">{(wItem.title || "?")[0]}</span>
                                  </div>
                                )}
                              </div>
                            </button>
                            <button onClick={() => toggleWatchlist(wItem)}
                              className="absolute top-1.5 right-1.5 bg-black/70 backdrop-blur-sm rounded-full p-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                            </button>
                            <p className="text-xs text-gray-300 mt-1.5 truncate">{wItem.title}</p>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ═══ PROFILE SHEET ═══ */}
          {showProfileSheet && (
            <div className="fixed inset-0 z-50 flex items-end md:items-stretch md:justify-end">
              <div className="absolute inset-0 bg-black/70 backdrop-blur-sm fade-in" onClick={() => setShowProfileSheet(false)} />
              <div className="relative w-full md:w-[480px] bg-gray-900 rounded-t-3xl md:rounded-none border-t md:border-t-0 md:border-l border-gray-700 max-h-[85vh] md:max-h-full md:h-full overflow-y-auto slide-up md:slide-left">
                <div className="sticky top-0 bg-gray-900 pt-4 pb-2 px-6 z-10">
                  <div className="w-10 h-1 bg-gray-500 rounded-full mx-auto mb-3" />
                </div>
                <div className="px-6 pb-8">
                  <button onClick={() => setShowProfileSheet(false)} className="absolute top-4 right-5 text-gray-500 hover:text-white z-10">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                  </button>

                  <h2 className="text-2xl font-bold mb-6">Profiles</h2>

                  {/* Profile 1 */}
                  <div className="mb-6 pb-6 border-b border-gray-800">
                    <div className="flex items-center justify-between mb-3">
                      <h3 className="text-lg font-bold">{profile1.name}</h3>
                      <button onClick={() => {
                          setShowProfileSheet(false); setCurrentUser(1);
                          if (profile1.genres?.length > 0) {
                            setAnalyzingDNA(true); setTasteDNA(null);
                            goTo(S.PROFILE_REVIEW);
                            (async () => {
                              try {
                                const dna = await analyzeTasteDNA(apiKey, profile1, genreMap, anthropicKey);
                                setTasteDNA(dna); setTasteDNA1(dna);
                              } catch (e) { const f = { traits: [], paragraph: "Couldn't analyze.", vibe: "Mystery" }; setTasteDNA(f); setTasteDNA1(f); }
                              setAnalyzingDNA(false);
                            })();
                          } else { goTo(S.PROFILE_GENRES); }
                        }} className="px-3 py-1.5 text-xs bg-orange-500 hover:bg-orange-600 rounded-lg font-medium active:scale-95">{profile1.genres?.length > 0 ? "View" : "Set up"}</button>
                    </div>
                    {profile1.genres && profile1.genres.length > 0 && (
                      <div className="mb-3">
                        <p className="text-xs text-gray-500 mb-2">Genres</p>
                        <div className="flex flex-wrap gap-2">
                          {profile1.genres.map(gid => (
                            <span key={gid} className="bg-gray-800 text-gray-300 text-xs px-2.5 py-1 rounded-full">
                              {GENRE_META[gid]?.icon} {GENRE_META[gid]?.label || gid}
                            </span>
                          ))}
                        </div>
                      </div>
                    )}
                    <p className="text-xs text-gray-500">{(profile1.favorites || []).length} favorite{(profile1.favorites || []).length !== 1 ? "s" : ""}</p>
                  </div>

                  {/* Profile 2 */}
                  <div className="mb-6 pb-6 border-b border-gray-800">
                    {isSolo ? (
                      <div className="rounded-2xl p-4"
                        style={{ background: "linear-gradient(135deg, rgba(120,40,20,0.22) 0%, rgba(120,20,40,0.15) 100%)", border: "1px dashed rgba(251,146,60,0.3)" }}>
                        <div className="flex items-center gap-3 mb-2">
                          <div className="w-10 h-10 rounded-full flex items-center justify-center text-xl"
                            style={{ background: "rgba(251,146,60,0.12)", border: "1px solid rgba(251,146,60,0.25)" }}>💺</div>
                          <div>
                            <h3 className="text-base font-bold text-gray-200">Empty chair</h3>
                            <p className="text-[11px] text-gray-500">Right now we're only picking for you. Add your partner and we'll find the stuff you'll both love.</p>
                          </div>
                        </div>
                        <button onClick={() => { setShowProfileSheet(false); goTo(S.PARTNER_HANDOFF); }}
                          className="mt-2 w-full py-2.5 rounded-xl text-sm font-semibold bg-gradient-to-r from-orange-500 to-rose-500 active:scale-95">
                          Invite your partner
                        </button>
                        <button onClick={() => { setShowProfileSheet(false); setCurrentUser(2); goTo(S.PROFILE_GENRES); }}
                          className="mt-2 w-full py-2 text-[12px] text-gray-400 hover:text-gray-200 transition-colors">
                          Or fill it out on this device →
                        </button>
                      </div>
                    ) : (
                      <>
                        <div className="flex items-center justify-between mb-3">
                          <h3 className="text-lg font-bold">{profile2.name || "Partner"}</h3>
                          <button onClick={() => {
                              setShowProfileSheet(false); setCurrentUser(2);
                              setAnalyzingDNA(true); setTasteDNA(null);
                              goTo(S.PROFILE_REVIEW);
                              (async () => {
                                try {
                                  const dna = await analyzeTasteDNA(apiKey, profile2, genreMap, anthropicKey);
                                  setTasteDNA(dna); setTasteDNA2(dna);
                                } catch (e) { const f = { traits: [], paragraph: "Couldn't analyze.", vibe: "Mystery" }; setTasteDNA(f); setTasteDNA2(f); }
                                setAnalyzingDNA(false);
                              })();
                            }} className="px-3 py-1.5 text-xs bg-orange-500 hover:bg-orange-600 rounded-lg font-medium active:scale-95">View</button>
                        </div>
                        <div className="mb-3">
                          <p className="text-xs text-gray-500 mb-2">Genres</p>
                          <div className="flex flex-wrap gap-2">
                            {profile2.genres.map(gid => (
                              <span key={gid} className="bg-gray-800 text-gray-300 text-xs px-2.5 py-1 rounded-full">
                                {GENRE_META[gid]?.icon} {GENRE_META[gid]?.label || gid}
                              </span>
                            ))}
                          </div>
                        </div>
                        <p className="text-xs text-gray-500">{(profile2.favorites || []).length} favorite{(profile2.favorites || []).length !== 1 ? "s" : ""}</p>
                      </>
                    )}
                  </div>

                  {/* Taste profile actions — AI is always on via the server-side proxy,
                      so the user no longer needs to bring their own API key. */}
                  <div>
                    <h3 className="text-lg font-bold mb-2">Taste profile</h3>
                    <p className="text-gray-500 text-xs mb-3">Re-run AI analysis on your favorites to refresh your taste profile and "why you'd like this" notes.</p>
                    <button
                      onClick={async () => {
                        setToastMsg("Regenerating taste profiles with AI...");
                        try {
                          const [dna1, dna2] = await Promise.all([
                            profile1.favorites?.length > 0 ? analyzeTasteDNA(apiKey, profile1, genreMap, anthropicKey) : null,
                            profile2.favorites?.length > 0 ? analyzeTasteDNA(apiKey, profile2, genreMap, anthropicKey) : null,
                          ]);
                          if (dna1) setTasteDNA1(dna1);
                          if (dna2) setTasteDNA2(dna2);
                          const errors = [dna1?.llmError, dna2?.llmError].filter(Boolean);
                          if (errors.length > 0) {
                            setToastMsg("Profiles updated but AI paragraph failed: " + errors[0].slice(0, 60));
                          } else if ((dna1?.llmUsed || !dna1) && (dna2?.llmUsed || !dna2)) {
                            setToastMsg("AI profiles updated!");
                          } else {
                            setToastMsg("Profiles updated (template fallback used)");
                          }
                        } catch (e) {
                          console.error("Re-analyze error:", e);
                          setToastMsg("Error: " + e.message.slice(0, 80));
                        }
                        setTimeout(() => setToastMsg(""), 5000);
                      }}
                      className="w-full py-2 bg-gray-800 border border-gray-700 rounded-lg text-xs text-gray-300 hover:text-white hover:border-orange-500/30 active:scale-95 transition-all"
                    >
                      Regenerate taste profiles with AI
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ═══ RESET CONFIRMATION ═══ */}
          {showResetConfirm && (
            <div className="fixed inset-0 z-50 flex items-center justify-center">
              <div className="absolute inset-0 bg-black/70" onClick={() => setShowResetConfirm(false)} />
              <div className="relative bg-gray-900 border border-gray-700 rounded-2xl p-6 mx-8 text-center max-w-lg">
                <div className="text-2xl mb-3">⚠️</div>
                <h3 className="font-bold text-lg mb-2">Start over?</h3>
                <p className="text-gray-400 text-sm mb-5">This will erase both profiles and all preferences.</p>
                <div className="flex gap-3">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-3 bg-gray-800 border border-gray-700 rounded-xl text-sm active:scale-95">Cancel</button>
                  <button onClick={resetAll} className="flex-1 py-3 bg-red-600 rounded-xl text-sm font-semibold active:scale-95">Reset everything</button>
                </div>
              </div>
            </div>
          )}

          {/* ═══ VIBE PICKER OVERLAY ═══ */}
          {vibePickerFav && (
            <div className="fixed inset-0 z-50 flex items-end md:items-stretch md:justify-end">
              <div className="absolute inset-0 bg-black/70 backdrop-blur-sm fade-in" onClick={() => setVibePickerFav(null)} />
              <div className="relative w-full md:w-[480px] bg-gray-900 rounded-t-3xl md:rounded-none border-t md:border-t-0 md:border-l border-gray-700 max-h-[80vh] md:max-h-full md:h-full overflow-y-auto slide-up md:slide-left">
                <div className="sticky top-0 bg-gray-900 pt-4 pb-2 px-6 z-10">
                  <div className="w-10 h-1 bg-gray-500 rounded-full mx-auto mb-3" />
                </div>
                <div className="px-6 pb-8">
                  <button onClick={() => setVibePickerFav(null)} className="absolute top-4 right-5 text-gray-500 hover:text-white z-10">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                  </button>

                  {/* Movie header */}
                  <div className="flex items-center gap-3 mb-5">
                    <div className="flex-shrink-0 rounded-lg overflow-hidden shadow-md" style={{ width: 48, height: 72 }}>
                      {vibePickerFav.poster_path ? (
                        <img src={img(vibePickerFav.poster_path, "w92")} alt="" className="w-full h-full object-cover" />
                      ) : (
                        <div className="w-full h-full bg-gray-800 flex items-center justify-center text-xs text-gray-500">{(vibePickerFav.title || vibePickerFav.name || "?")[0]}</div>
                      )}
                    </div>
                    <div>
                      <h3 className="font-bold text-lg leading-tight">{vibePickerFav.title || vibePickerFav.name}</h3>
                      <p className="text-gray-400 text-xs mt-0.5">What do you love about this?</p>
                    </div>
                  </div>

                  {/* Vibe grid */}
                  <div className="grid grid-cols-2 gap-2">
                    {VIBE_OPTIONS.map(v => {
                      const sel = (currentProfile.vibeTags?.[vibePickerFav.id] || []).includes(v.id);
                      return (
                        <button key={v.id} onClick={() => toggleVibeTag(vibePickerFav.id, v.id)}
                          className={`flex items-start gap-2.5 p-3 rounded-xl border-2 transition-all active:scale-95 text-left ${
                            sel ? "border-orange-400 bg-orange-400/15" : "border-gray-700 bg-gray-800/50 hover:border-gray-600"
                          }`}>
                          <span className="text-lg mt-0.5">{v.icon}</span>
                          <div>
                            <span className={`text-sm font-medium ${sel ? "text-orange-200" : "text-gray-200"}`}>{v.label}</span>
                            <p className="text-gray-500 text-[10px] leading-tight mt-0.5">{v.desc}</p>
                          </div>
                        </button>
                      );
                    })}
                  </div>

                  <button onClick={() => setVibePickerFav(null)}
                    className="mt-5 w-full py-3 bg-gradient-to-r from-orange-500 to-rose-500 rounded-2xl font-semibold text-sm active:scale-95">
                    Done
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ═══ TOAST MESSAGE ═══ */}
          {toastMsg && (
            <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-3 rounded-lg text-xs z-40 fade-in break-words" style={{ maxWidth: "85vw", minWidth: 200 }}>
              {toastMsg}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
