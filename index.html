    // Initialize the Supabase client once, attach to window so the React app can grab it.
    (function () {
      const cfg = window.COUCH_POTATOES_CONFIG || {};

        console.error("[Couch Potatoes] config.js is missing SUPABASE_URL or SUPABASE_ANON_KEY");
        return;
      }
      try {
        window.cpSupabase = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
        window.CP_PROXY_BASE = cfg.SUPABASE_URL + "/functions/v1";
        console.log("%c[Couch Potatoes] Supabase client ready", "color:#fb923c;font-weight:bold");
      } catch (e) {
        console.error("[Couch Potatoes] Failed to init Supabase client:", e);
      }
    })();

    // ──────────────────────────────────────────────
    // TMDB API
    // ──────────────────────────────────────────────

    const IMG_BASE = "https://image.tmdb.org/t/p";

    function img(path, size = "w342") {
      if (!path) return null;
      return `${IMG_BASE}/${size}${path}`;
    }

    // TMDB calls now go through our Supabase edge function proxy so the
    // bearer token never touches the browser. The `apiKey` parameter is kept
    // for backward compatibility with all existing call sites but is ignored —
    // auth happens server-side inside the proxy.
    async function tmdb(endpoint, _apiKey, params = {}) {
      const base = (window.CP_PROXY_BASE || "") + "/tmdb-proxy";
      const url = new URL(base + endpoint);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null && v !== "") url.searchParams.set(k, v);
      });
      const res = await fetch(url.toString());
      if (!res.ok) throw new Error(`TMDB ${res.status}`);
      return res.json();
    }

    // Fetch genre list
    async function fetchGenres(apiKey) {
      const [movie, tv] = await Promise.all([
        tmdb("/genre/movie/list", apiKey),
        tmdb("/genre/tv/list", apiKey),
      ]);
      const map = {};
      [...movie.genres, ...tv.genres].forEach(g => { map[g.id] = g.name; });
      return map;
    }

    // Search movies & TV
    async function searchMulti(apiKey, query) {
      const data = await tmdb("/search/multi", apiKey, { query, include_adult: false });
      return data.results.filter(r => r.media_type === "movie" || r.media_type === "tv").slice(0, 8);
    }

    // Get movie/TV details with watch providers
    async function getDetails(apiKey, id, mediaType = "movie") {
      const [details, providers, similar] = await Promise.all([
        tmdb(`/${mediaType}/${id}`, apiKey, { append_to_response: "credits,keywords,videos,external_ids" }),
        tmdb(`/${mediaType}/${id}/watch/providers`, apiKey).catch(() => ({})),
        tmdb(`/${mediaType}/${id}/similar`, apiKey).catch(() => ({ results: [] })),
      ]);

      // Extract trailer from videos
      let trailer = null;
      if (details.videos?.results?.length > 0) {
        const officialTrailers = details.videos.results.filter(v => v.type === "Trailer" && v.site === "YouTube" && v.official);
        const anyTrailers = details.videos.results.filter(v => v.type === "Trailer" && v.site === "YouTube");
        const trailerVideo = officialTrailers.length > 0 ? officialTrailers[0] : anyTrailers[0];
        if (trailerVideo) trailer = trailerVideo.key;
      }

      // Get IMDB ID for OMDb lookup
      const imdbId = details.imdb_id || details.external_ids?.imdb_id || null;

      // Try to fetch Rotten Tomatoes score via OMDb (free tier)
      let rtScore = null;
      if (imdbId) {
        try {
          const omdbResp = await fetch(`https://www.omdbapi.com/?i=${imdbId}&apikey=4a29965f`);
          const omdbData = await omdbResp.json();
          if (omdbData.Ratings) {
            const rt = omdbData.Ratings.find(r => r.Source === "Rotten Tomatoes");
            if (rt) rtScore = rt.Value; // e.g., "94%"
          }
        } catch {}
      }

      return { ...details, providers: providers.results?.US || {}, similar: similar.results?.slice(0, 12) || [], trailer, rtScore };
    }

    // Discover movies/TV by genre with various filters
    async function discover(apiKey, mediaType, params, pages = 2) {
      const pagePromises = [];
      for (let p = 1; p <= pages; p++) {
        pagePromises.push(
          tmdb(`/discover/${mediaType}`, apiKey, {
            sort_by: "vote_average.desc",
            "vote_count.gte": 200,
            include_adult: false,
            page: p,
            ...params,
          })
        );
      }
      const results = await Promise.all(pagePromises);
      return results.flatMap(r => r.results || []);
    }

    // Get trending
    async function getTrending(apiKey, mediaType = "all", window = "week") {
      const data = await tmdb(`/trending/${mediaType}/${window}`, apiKey);
      return data.results || [];
    }

    // ── Claude AI helper ──
    // Models to try in order (cheapest first, then fallback)
    const CLAUDE_MODELS = ["claude-haiku-4-5", "claude-sonnet-4-20250514", "claude-sonnet-4-5"];
    let _workingModel = null; // cache which model works

    // Claude calls now go through our Supabase edge function proxy so the
    // Anthropic API key never touches the browser. The `_anthropicKey` parameter
    // is kept for backward compatibility but ignored — auth happens server-side.
    async function callClaudeWithModel(_anthropicKey, model, prompt, maxTokens) {
      const base = (window.CP_PROXY_BASE || "") + "/claude-proxy";
      const resp = await fetch(base, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model,
          max_tokens: maxTokens,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      if (!resp.ok) {
        const errBody = await resp.text().catch(() => "");
        throw new Error(`${resp.status}: ${errBody.slice(0, 150)}`);
      }
      const data = await resp.json();
      return data.content?.[0]?.text || "";
    }

    async function callClaude(anthropicKey, prompt, maxTokens = 200) {
      // If we already know which model works, use it directly
      if (_workingModel) {
        return callClaudeWithModel(anthropicKey, _workingModel, prompt, maxTokens);
      }
      // Otherwise try models in order until one works
      let lastError = null;
      for (const model of CLAUDE_MODELS) {
        try {
          const result = await callClaudeWithModel(anthropicKey, model, prompt, maxTokens);
          _workingModel = model;
          console.log("Claude: using model", model);
          return result;
        } catch (e) {
          console.warn(`Model ${model} failed:`, e.message);
          lastError = e;
        }
      }
      throw new Error(`All Claude models failed. Last error: ${lastError?.message || "unknown"}`);
    }

    // Test if an Anthropic API key is valid (tries all models)
    async function testAnthropicKey(key) {
      _workingModel = null; // reset cache
      const errors = [];
      for (const model of CLAUDE_MODELS) {
        try {
          await callClaudeWithModel(key, model, "Hi", 5);
          _workingModel = model;
          return { ok: true, model };
        } catch (e) {
          errors.push(`${model}: ${e.message}`);
          console.error(`Test model ${model} failed:`, e.message);
        }
      }
      // Show the first error since they're likely all the same root cause
      const firstErr = errors[0] || "unknown";
      // Parse common error patterns for user-friendly messages
      let hint = "";
      if (firstErr.includes("401")) hint = " → Invalid API key. Double-check you copied the full key from console.anthropic.com/settings/keys";
      else if (firstErr.includes("403")) hint = " → Key doesn't have permission. Check account settings.";
      else if (firstErr.includes("invalid_request")) hint = " → Request rejected. Your key may need 'browser access' enabled, or try a different key.";
      else if (firstErr.includes("Failed to fetch") || firstErr.includes("NetworkError")) hint = " → Network/CORS error. Browser may be blocking the request.";
      return { ok: false, error: firstErr + hint, allErrors: errors };
    }

    // ──────────────────────────────────────────────
    // LOCAL STORAGE
    // ──────────────────────────────────────────────

    const STORAGE_KEY = "couch_potatoes_data";

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;

    function saveData(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}

    // ──────────────────────────────────────────────
    // SUPABASE HOUSEHOLD SYNC
    //
    // localStorage stays as a fast in-browser cache (so the app boots instantly
    // and works offline). On top of that we mirror the data to a `households`
    // row in Supabase, keyed by a household ID. The household ID is generated
    // on first use and stored in localStorage as `cp_householdId`.
    //
    // - getHouseholdId(): generate-or-load the local household id
    // - cloudLoadHousehold(id): one-shot fetch on app boot
    // - cloudSaveHousehold(id, data): debounced upsert when local state changes
    // - cloudSubscribeHousehold(id, onChange): realtime listener for partner edits
    // ──────────────────────────────────────────────

    function getHouseholdId() {
      try {
        const existing = localStorage.getItem("cp_householdId");
        if (existing) return existing;
        const fresh = "cp_" + Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 10);
        localStorage.setItem("cp_householdId", fresh);
        return fresh;
      } catch { return "cp_demo"; }
    }

    async function cloudLoadHousehold(id) {
      if (!window.cpSupabase || !id) return null;
      try {
        const { data, error } = await window.cpSupabase
          .from("households")
          .select("profile1, profile2, services, session_prefs, state, updated_at")
          .eq("id", id)
          .maybeSingle();
        if (error) { console.warn("[cloud] load error:", error); return null; }
        return data;
      } catch (e) { console.warn("[cloud] load threw:", e); return null; }
    }

    let _cloudSaveTimer = null;
    function cloudSaveHousehold(id, payload) {
      if (!window.cpSupabase || !id) return;
      // Debounce — coalesce rapid edits into one upsert
      clearTimeout(_cloudSaveTimer);
      _cloudSaveTimer = setTimeout(async () => {
        try {
          const { error } = await window.cpSupabase
            .from("households")
            .upsert({
              id,
              profile1: payload.profile1 || null,
              profile2: payload.profile2 || null,
              services: payload.services || null,
              session_prefs: payload.sessionPrefs || null,
              state: payload.state || null,
            }, { onConflict: "id" });
          if (error) console.warn("[cloud] save error:", error);
        } catch (e) { console.warn("[cloud] save threw:", e); }
      }, 800);
    }

    function cloudSubscribeHousehold(id, onChange) {
      if (!window.cpSupabase || !id) return () => {};
      const channel = window.cpSupabase
        .channel(`household:${id}`)
        .on("postgres_changes",
          { event: "*", schema: "public", table: "households", filter: `id=eq.${id}` },
          (payload) => {
            if (payload.new) onChange(payload.new);
          })
        .subscribe();
      return () => { try { window.cpSupabase.removeChannel(channel); } catch {} };
    }

    async function analyzeTasteDNA(apiKey, profile, genreMap, anthropicKey = null) {
      const { genres, favorites } = profile;
      if (!favorites || favorites.length === 0) return { traits: [], paragraph: "", vibe: "" };

      // Fetch details + keywords for each favorite
      const detailsPromises = favorites.map(f => {
        const mediaType = f.media_type || (f.first_air_date ? "tv" : "movie");
        return tmdb(`/${mediaType}/${f.id}`, apiKey, { append_to_response: "keywords" }).catch(() => null);
      });
      const allDetails = (await Promise.all(detailsPromises)).filter(Boolean);

      // Collect all keyword IDs, all genre IDs from favorites, and decades
      const allKeywordIds = new Set();
      const allFavGenreIds = new Set();
      const decades = {};

      allDetails.forEach(d => {
        const kws = d.keywords?.keywords || d.keywords?.results || [];
        kws.forEach(k => allKeywordIds.add(k.id));
        (d.genres || []).forEach(g => allFavGenreIds.add(g.id));

      const detectThemes = (kwNames, overview) => {
        const found = [];
        const ovLower = (overview || "").toLowerCase();
        for (const [theme, patterns] of Object.entries(THEME_PATTERNS)) {
          const kwMatch = kwNames.some(k => patterns.keywords.some(pk => k.includes(pk)));
          const ovMatch = patterns.overviewWords.some(w => ovLower.includes(w));
          if (kwMatch || ovMatch) found.push(theme);
        }
        return found;
      };

      // Human-readable theme descriptions for "why" notes
      const THEME_HOOKS = {
        revenge: { desc: "a satisfying payback story", vibe: "raw, intense vengeance energy" },
        heist: { desc: "a clever heist with moving parts", vibe: "that rush of a plan coming together" },
        survival: { desc: "raw survival stakes", vibe: "pure adrenaline survival mode" },
        conspiracy: { desc: "a conspiracy that unravels layer by layer", vibe: "paranoid, twisty thriller vibes" },
        redemption: { desc: "a powerful redemption arc", vibe: "an emotional turnaround story" },
        family: { desc: "family bonds at the center", vibe: "heartfelt family dynamics" },
        loveStory: { desc: "an emotional love story", vibe: "romantic chemistry worth investing in" },
        histEpic: { desc: "a sweeping historical epic", vibe: "grand scale, real history" },
        mindBend: { desc: "a mind-bending premise", vibe: "the kind of twist that rewires your brain" },
        darkHumor: { desc: "dark humor with real bite", vibe: "laughs in the darkest places" },
        comingOfAge: { desc: "a coming-of-age story with heart", vibe: "nostalgic, growing-up energy" },
        supernatural: { desc: "supernatural tension", vibe: "eerie, otherworldly atmosphere" },
        trueCrime: { desc: "a gripping crime investigation", vibe: "true-crime energy you can't turn off" },
        underdog: { desc: "an underdog story", vibe: "pure rooting-for-them energy" },
        visualSpectacle: { desc: "stunning visuals and epic scale", vibe: "a visual feast" },
        ensemble: { desc: "a rich ensemble cast", vibe: "great characters bouncing off each other" },
        isolation: { desc: "an intimate character study", vibe: "quiet, deep, and personal" },
        classDivide: { desc: "sharp social commentary", vibe: "makes you think about the real world" },
        mystery: { desc: "a mystery that keeps you guessing", vibe: "whodunit energy you'll love" },
        war: { desc: "wartime grit and stakes", vibe: "visceral, high-stakes conflict" },
        space: { desc: "the wonder and danger of space", vibe: "big sci-fi scale" },
        music: { desc: "music at the heart of the story", vibe: "a story that moves to a beat" },
        sports: { desc: "the thrill of competition", vibe: "game-day adrenaline" },
        healer: { desc: "high-stakes human drama", vibe: "life-and-death tension" },
        power: { desc: "a gripping power struggle", vibe: "politics and ambition colliding" },
      };

      const getWhyNote = (profile, dna) => {
        const itemGenres = new Set(currentItem.genre_ids || details?.genres?.map(g => g.id) || []);
        const rating = currentItem.vote_average || 0;
        const overview = currentItem.overview || details?.overview || "";
        const itemTitle = currentItem.title || currentItem.name;
        const favs = profile.favorites || [];
        const traits = dna?.traits || [];
        const traitIds = new Set(traits.map(t => t.id));
        const selectedGenres = new Set((profile.genres || []).map(g => typeof g === "object" ? g.id : g));

        // Get item's TMDB keywords & themes
        const itemKwNames = (details?.keywords?.keywords || details?.keywords?.results || []).map(k => k.name?.toLowerCase() || "");
        const itemThemes = detectThemes(itemKwNames, overview);

        // Helper: genre name
        const gName = (g) => GENRE_META[g]?.label?.toLowerCase() || genreMap?.[g]?.toLowerCase() || "";

        // ── Layer 1: Cast/director connection (most specific & compelling) ──
        if (details?.credits?.cast?.length > 0 && dna?.goToActors?.length > 0) {
          const goToNames = dna.goToActors.map(a => a.name);
          const matchedActor = details.credits.cast.find(c => goToNames.includes(c.name));
          if (matchedActor) {
            return `Stars ${matchedActor.name} — you loved them in your favorites`;
          }
        }
        if (details?.credits?.crew?.length > 0 && dna?.goToDirectors?.length > 0) {
          const goToNames = dna.goToDirectors.map(d => d.name);
          const director = details.credits.crew.find(c => c.job === "Director");
          if (director && goToNames.includes(director.name)) {
            return `From ${director.name} — a director whose work you consistently love`;
          }
        }

        // ── Layer 2: Connect to a specific favorite (reworded to avoid confusion) ──
        for (const fav of favs) {
          const favGenres = new Set(fav.genre_ids || []);
          const genreOverlap = [...itemGenres].filter(g => favGenres.has(g));
          if (genreOverlap.length < 2) continue; // need strong overlap

          const favName = fav.title || fav.name;
          const favOverview = fav.overview || "";
          const favThemes = detectThemes([], favOverview);
          const sharedThemes = itemThemes.filter(t => favThemes.includes(t));

          if (sharedThemes.length > 0) {
            const themeObj = THEME_HOOKS[sharedThemes[0]];
            return `Same energy as ${favName} — ${themeObj?.vibe || themeObj?.desc || "similar vibe"}`;
          }
          if (genreOverlap.length >= 2) {
            const sharedNames = genreOverlap.slice(0, 2).map(gName).filter(Boolean);
            return `Shares ${favName}'s ${sharedNames.join("/")} DNA`;
          }
        }

        // ── Layer 3: Theme-specific pitch (describes THIS movie) ──
        if (itemThemes.length > 0) {
          const primaryTheme = itemThemes[0];
          const themeObj = THEME_HOOKS[primaryTheme];
          if (!themeObj) return null;

          // Connect to a trait for personalization
          const themeTraitMap = {
            revenge: ["edge-seeker", "noir-connoisseur"],
            heist: ["brainy-viewer", "noir-connoisseur"],
            conspiracy: ["brainy-viewer", "true-crime"],
            mindBend: ["brainy-viewer", "cult-hunter"],
            trueCrime: ["true-crime", "noir-connoisseur"],
            mystery: ["true-crime", "brainy-viewer"],
            redemption: ["slow-burn", "romantic-heart"],
            loveStory: ["romantic-heart", "comfort-rewatcher"],
            histEpic: ["epic-scale", "cinephile"],
            survival: ["edge-seeker", "slow-burn"],
            visualSpectacle: ["visual-maximalist", "epic-scale"],
            darkHumor: ["cult-hunter", "laugh-chaser"],
            comingOfAge: ["comfort-rewatcher", "romantic-heart"],
            supernatural: ["edge-seeker", "fantasy-dweller"],
            underdog: ["comfort-rewatcher"],
            family: ["comfort-rewatcher", "slow-burn"],
            war: ["epic-scale", "edge-seeker"],
            space: ["brainy-viewer", "epic-scale", "fantasy-dweller"],
            power: ["noir-connoisseur", "epic-scale"],
          };

          const relevantTraits = themeTraitMap[primaryTheme] || [];
          const matchedTrait = traits.find(t => relevantTraits.includes(t.id));

          if (matchedTrait) {
            return `${themeObj.vibe[0].toUpperCase() + themeObj.vibe.slice(1)} — feeds your ${matchedTrait.label.toLowerCase()} side`;
          }
          return themeObj.vibe[0].toUpperCase() + themeObj.vibe.slice(1);
        }

        // ── Layer 4: Overview-based specifics ──
        const ovLower = overview.toLowerCase();
        if (ovLower.includes("true story") || ovLower.includes("based on")) {
          return "Based on a true story — the real events make it compelling";
        }
        if (ovLower.includes("twist") || ovLower.includes("nothing is what it seems")) {
          return "Has twists you won't see coming";
        }

        // ── Layer 5: Genre + trait pairing ──
        const matchedGenres = [...itemGenres].filter(g => selectedGenres.has(g));
        if (matchedGenres.length > 0) {
          const genreNames = matchedGenres.slice(0, 2).map(gName).filter(Boolean);
          if (genreNames.length > 0) {
            if (traitIds.has("noir-connoisseur") && (itemGenres.has(80) || itemGenres.has(53))) return `Dark, gritty ${genreNames[0]} — your noir side will love this`;
            if (traitIds.has("edge-seeker") && (itemGenres.has(28) || itemGenres.has(53))) return `Intense ${genreNames[0]} that doesn't let up`;
            if (traitIds.has("brainy-viewer") && (itemGenres.has(9648) || itemGenres.has(878))) return `Smart ${genreNames[0]} that trusts you to keep up`;
            if (traitIds.has("laugh-chaser") && itemGenres.has(35)) return `The kind of comedy you'll be quoting for weeks`;
            if (traitIds.has("epic-scale") && (itemGenres.has(12) || itemGenres.has(14))) return `Big, sweeping ${genreNames[0]} — pure spectacle`;
            if (traitIds.has("slow-burn") && itemGenres.has(18)) return `A slow-building drama with serious payoff`;
            if (traitIds.has("romantic-heart") && itemGenres.has(10749)) return `A love story that earns every moment`;
            if (traitIds.has("true-crime") && itemGenres.has(80)) return `Gripping crime story — right in your wheelhouse`;
            if (rating >= 7.5) return `Highly rated ${genreNames.join(" + ")} — right up your alley`;
            return `Hits your ${genreNames.join(" and ")} sweet spot`;
          }
        }

        // ── Layer 6: Rating + popularity fallback ──
        if (rating >= 8.0) return `Rated ${rating.toFixed(1)}/10 — one of the best in its genre`;
        if (rating >= 7.0) return `Rated ${rating.toFixed(1)}/10 — well worth your time`;

        // ── Absolute fallback ──
        const topGenreName = [...itemGenres].map(g => GENRE_META[g]?.label || genreMap?.[g] || "").filter(Boolean)[0];
        if (topGenreName) return `A solid ${topGenreName.toLowerCase()} pick based on your taste`;
        return "Worth a look based on your taste";
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end md:items-stretch md:justify-end">
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm fade-in" onClick={onClose} />
          <div className="relative w-full md:w-[480px] bg-gray-900 rounded-t-3xl md:rounded-none border-t md:border-t-0 md:border-l border-gray-700 max-h-[85vh] md:max-h-full md:h-full overflow-y-auto slide-up md:slide-left">
            <div className="sticky top-0 bg-gray-900 pt-4 pb-2 px-6 z-10">
              <div className="w-10 h-1 bg-gray-500 rounded-full mx-auto mb-3" />
            </div>
            <div className="px-6 pb-8">
              {sheetHistory.length > 0 && (
                <button onClick={() => {
                  const prev = sheetHistory[sheetHistory.length - 1];
                  setSheetHistory(h => h.slice(0, -1));
                  setCurrentItem(prev);
                }} className="flex items-center gap-1 text-gray-400 hover:text-white text-sm mb-2 transition-colors">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                  Back
                </button>
              )}
              <button onClick={onClose} className="absolute top-4 right-5 text-gray-500 hover:text-white z-10 transition-colors duration-200">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
              </button>

              {showTrailer && details?.trailer ? (
                <div className="mb-4">
                  <button onClick={() => setShowTrailer(false)} className="absolute top-4 left-6 text-gray-500 hover:text-white z-10 transition-colors duration-200">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                  </button>
                  <div style={{ paddingBottom: "56.25%", position: "relative", height: 0 }}>
                    <iframe
                      style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%" }}
                      src={`https://www.youtube.com/embed/${details.trailer}?autoplay=1&rel=0`}
                      frameBorder="0"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                      allowFullScreen
                    />
                  </div>
                </div>
              ) : (
                <div className="flex gap-3.5 mb-3 pb-3 border-b border-gray-800">
                  <div className="flex-shrink-0 rounded-xl overflow-hidden shadow-lg relative" style={{ width: 90, height: 135 }}>
                    {currentItem.poster_path ? (
                      <img src={img(currentItem.poster_path, "w342")} alt="" className="w-full h-full object-cover" />
                    ) : (
                      <div className="w-full h-full bg-gradient-to-br from-orange-950/50 via-rose-950/30 to-gray-900 flex items-center justify-center">
                        <span className="text-white font-black text-2xl opacity-80">{title[0]}</span>
                      </div>
                    )}
                    {details?.trailer && (
                      <button onClick={() => setShowTrailer(true)} className="absolute inset-0 flex items-center justify-center bg-black/40 hover:bg-black/50 transition-all">
                        <div className="w-10 h-10 rounded-full bg-orange-500/80 flex items-center justify-center">
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </div>
                      </button>
                    )}
                  </div>
                  <div className="flex-1 min-w-0">
                    <h2 className="text-lg font-bold leading-tight mb-0.5">{title}</h2>
                    <div className="flex items-center gap-1.5 text-gray-500 text-xs mb-1.5">
                      <span>{year}</span>
                      {runtime && <><span>·</span><span>{runtime}</span></>}
                      {mediaType === "tv" && <span className="bg-gray-800 text-gray-400 text-[10px] px-1.5 py-0.5 rounded">TV</span>}
                    </div>
                    <div className="mb-1.5"><RatingBadge vote={currentItem.vote_average} rt={details?.rtScore} /></div>
                    <GenreTags genreIds={currentItem.genre_ids || details?.genres?.map(g => g.id)} genreMap={genreMap} />
                  </div>
                </div>
              )}

              {/* Why you'd like this — compact text lines */}
              {(() => {
                // hasPartner mirrors the LLM-call gate: solo users (or those who
                // typed a partner name but never picked genres) shouldn't see a
                // ghost note for an empty profile.
                const hasPartner = !!(profile2.name && profile2.genres && profile2.genres.length > 0);
                const templateNote1 = getWhyNote(profile1, tasteDNA1);
                const templateNote2 = hasPartner ? getWhyNote(profile2, tasteDNA2) : null;
                const hasLLM = !!anthropicKey;
                const isLoading = hasLLM && llmNotes.loading;
                const note1 = (hasLLM && llmNotes.note1) ? llmNotes.note1 : templateNote1;
                const note2 = hasPartner ? ((hasLLM && llmNotes.note2) ? llmNotes.note2 : templateNote2) : null;
                const showNote1 = isLoading ? templateNote1 : note1;
                const showNote2 = isLoading ? templateNote2 : note2;
                if (!showNote1 && !showNote2) return null;
                return (
                  <div className="mb-4 pb-3 border-b border-gray-800">
                    <p className="text-[10px] text-gray-600 uppercase tracking-wider mb-1.5 flex items-center gap-1">Why you'd like this{hasLLM && <svg width="10" height="10" viewBox="0 0 16 16" fill="none" className="inline-block"><path d="M8 0l1.5 5.5L16 8l-6.5 2.5L8 16l-1.5-5.5L0 8l6.5-2.5z" fill="currentColor" opacity="0.5"/></svg>}{isLoading && <span className="ml-0.5 text-orange-400/50 normal-case tracking-normal animate-pulse">personalizing...</span>}</p>
                    {showNote1 && (
                      <p className={`text-[13px] leading-snug mb-1 transition-opacity duration-300 ${isLoading ? "opacity-50" : "opacity-100"}`}>
                        <span className="text-orange-300 font-medium">{profile1.name}:</span>{" "}
                        <span className="text-gray-300">{showNote1}</span>
                      </p>
                    )}
                    {showNote2 && (
                      <p className={`text-[13px] leading-snug transition-opacity duration-300 ${isLoading ? "opacity-50" : "opacity-100"}`}>
                        <span className="text-amber-300 font-medium">{profile2.name}:</span>{" "}
                        <span className="text-gray-300">{showNote2}</span>
                      </p>
                    )}
                  </div>
                );
              })()}

              {/* Synopsis — truncated with expand */}
              {(() => {
                const overview = currentItem.overview || details?.overview || "";
                const isTruncatable = overview.length > 150;
                return overview ? (
                  <div className="mb-4">
                    <p className={`text-gray-500 text-[13px] leading-relaxed ${!synopsisExpanded && isTruncatable ? "line-clamp-3" : ""}`}>{overview}</p>
                    {isTruncatable && (
                      <button onClick={() => setSynopsisExpanded(!synopsisExpanded)} className="text-xs text-gray-600 hover:text-gray-400 mt-1 transition-colors">
                        {synopsisExpanded ? "Show less" : "Read more"}
                      </button>
                    )}
                  </div>
                ) : null;
              })()}

              {/* Compact action row: Save + Feedback per person */}
              <div className="mb-4 space-y-2.5">
                {/* Save for Later — inline */}
                <button onClick={() => toggleWatchlist(currentItem)}
                  className={`w-full flex items-center justify-center gap-2 py-2 rounded-xl text-sm font-medium transition-all duration-200 active:scale-95 ${
                    watchlist.has(currentItem.id)
                      ? "bg-violet-500/20 text-violet-300 border border-violet-500/30"
                      : "bg-gray-800/80 text-gray-400 border border-gray-700 hover:border-violet-500/30 hover:text-violet-300"
                  }`}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill={watchlist.has(currentItem.id) ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                  {watchlist.has(currentItem.id) ? "Saved" : "Save for later"}
                </button>

                {/* Compact feedback — both partners in one block */}
                <div className="bg-white/5 rounded-xl p-2.5 border border-gray-800">
                  {/* Partner 1 row */}
                  <div className="flex items-center gap-1.5 mb-2">
                    <span className="text-xs font-medium text-orange-200 w-14 truncate flex-shrink-0">{profile1.name}</span>
                    <div className="flex gap-1 flex-1">
                      <button onClick={() => onLike(0, currentItem)}
                        className={`flex items-center gap-0.5 px-2 py-1 rounded-md text-[11px] transition-all active:scale-95 border ${
                          liked[0]?.has(currentItem.id) && !loved[0]?.has(currentItem.id) ? "bg-orange-500/25 text-orange-300 border-orange-500/30" : "bg-gray-800 text-gray-500 border-gray-700/50"
                        }`}>
                        <span>👍</span><span>Like</span>
                      </button>
                      <button onClick={() => onLove(0, currentItem)}
                        className={`flex items-center gap-0.5 px-2 py-1 rounded-md text-[11px] transition-all active:scale-95 border ${
                          loved[0]?.has(currentItem.id) ? "bg-rose-500/25 text-rose-300 border-rose-500/30" : "bg-gray-800 text-gray-500 border-gray-700/50"
                        }`}>
                        <span>❤️</span><span>Love</span>
                      </button>
                      <button onClick={() => onNah(0, currentItem.id)}
                        className={`flex items-center gap-0.5 px-2 py-1 rounded-md text-[11px] transition-all active:scale-95 border ${
                          nah[0]?.has(currentItem.id) ? "bg-red-900/30 text-red-400 border-red-700/30" : "bg-gray-800 text-gray-500 border-gray-700/50"
                        }`}>
                        <span>👎</span>
                      </button>
                    </div>
                    <button onClick={() => toggleSeen(0, currentItem.id)}
                      className={`flex items-center gap-0.5 px-2 py-1 rounded-md text-[11px] transition-all active:scale-95 border ${
                        s1 ? "bg-cyan-500/20 text-cyan-200 border-cyan-500/30" : "bg-gray-800 text-gray-500 border-gray-700/50"
                      }`}>
                      <span>{s1 ? "✓" : "👁"}</span><span>Seen</span>
                    </button>
                  </div>
                  {/* Partner 2 row */}
                  <div className="flex items-center gap-1.5">
                    <span className="text-xs font-medium text-amber-300 w-14 truncate flex-shrink-0">{profile2.name}</span>
                    <div className="flex gap-1 flex-1">
                      <button onClick={() => onLike(1, currentItem)}
                        className={`flex items-center gap-0.5 px-2 py-1 rounded-md text-[11px] transition-all active:scale-95 border ${
                          liked[1]?.has(currentItem.id) && !loved[1]?.has(currentItem.id) ? "bg-orange-500/25 text-orange-300 border-orange-500/30" : "bg-gray-800 text-gray-500 border-gray-700/50"
                        }`}>
                        <span>👍</span><span>Like</span>
                      </button>
                      <button onClick={() => onLove(1, currentItem)}
                        className={`flex items-center gap-0.5 px-2 py-1 rounded-md text-[11px] transition-all active:scale-95 border ${
                          loved[1]?.has(currentItem.id) ? "bg-rose-500/25 text-rose-300 border-rose-500/30" : "bg-gray-800 text-gray-500 border-gray-700/50"
                        }`}>
                        <span>❤️</span><span>Love</span>
                      </button>
                      <button onClick={() => onNah(1, currentItem.id)}
                        className={`flex items-center gap-0.5 px-2 py-1 rounded-md text-[11px] transition-all active:scale-95 border ${
                          nah[1]?.has(currentItem.id) ? "bg-red-900/30 text-red-400 border-red-700/30" : "bg-gray-800 text-gray-500 border-gray-700/50"
                        }`}>
                        <span>👎</span>
                      </button>
                    </div>
                    <button onClick={() => toggleSeen(1, currentItem.id)}
                      className={`flex items-center gap-0.5 px-2 py-1 rounded-md text-[11px] transition-all active:scale-95 border ${
                        s2 ? "bg-cyan-500/20 text-cyan-200 border-cyan-500/30" : "bg-gray-800 text-gray-500 border-gray-700/50"
                      }`}>
                      <span>{s2 ? "✓" : "👁"}</span><span>Seen</span>
                    </button>
                  </div>
                </div>
              </div>

              {/* Top Cast — simple text */}
              {details?.credits?.cast && details.credits.cast.length > 0 && (
                <p className="text-[13px] text-gray-500 mb-4">
                  <span className="text-gray-600">Starring </span>
                  {details.credits.cast.slice(0, 4).map(a => a.name).join(", ")}
                </p>
              )}

              {/* Streaming */}
              {!loading && (
                <div className="mb-4">
                  <p className="text-[10px] text-gray-600 uppercase tracking-wider mb-2">Where to watch</p>
                  <div className="flex flex-wrap gap-2">
                    {flatrate.map(p => (
                      <div key={p.provider_id} className="flex items-center gap-1.5 bg-gray-800 px-2.5 py-1.5 rounded-lg">
                        <img src={img(p.logo_path, "w45")} alt="" className="w-5 h-5 rounded" />
                        <span className="text-xs text-white font-medium">{p.provider_name}</span>
                      </div>
                    ))}
                    {rent.length > 0 && (
                      <div className="flex items-center gap-1.5 bg-gray-800/60 px-2.5 py-1.5 rounded-lg border border-gray-700">
                        <span className="text-xs text-gray-400">Rent from {rent.length} source{rent.length > 1 ? "s" : ""}</span>
                      </div>
                    )}
                    {buy.length > 0 && (
                      <div className="flex items-center gap-1.5 bg-gray-800/60 px-2.5 py-1.5 rounded-lg border border-gray-700">
                        <span className="text-xs text-gray-400">Buy from {buy.length} source{buy.length > 1 ? "s" : ""}</span>
                      </div>
                    )}
                    {flatrate.length === 0 && rent.length === 0 && buy.length === 0 && (
                      <span className="text-xs text-gray-500">No streaming info available</span>
                    )}
                  </div>
                </div>
              )}

              {/* Similar (horizontal scroll) */}
              {details?.similar?.length > 0 && (
                <div className="mb-4">
                  <p className="text-[10px] text-gray-600 uppercase tracking-wider mb-2">Similar titles</p>
                  <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
                    {details.similar.slice(0, 8).map(s => (
                      <Poster key={s.id} item={{ ...s, media_type: mediaType }} size="medium"
                        onClick={() => {
                          setSheetHistory(prev => [...prev, currentItem]);
                          setCurrentItem({ ...s, media_type: mediaType });
                        }} saved={watchlist.has(s.id)} />
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ──────────────────────────────────────────────
    // MAIN APP
    // ──────────────────────────────────────────────

    function App() {
      const saved = useMemo(() => loadData(), []);

      // ─── Key bootstrap: URL params take precedence so you can prime a fresh browser
      // with `?tmdb=eyJ...&anthropic=sk-ant-...`. Keys are immediately stripped from the
      // URL so they don't live in history/referer logs. Also exposes window.cpSetKeys /
      // cpClearKeys for console-based bootstrapping.
      const urlBootstrap = useMemo(() => {
        if (typeof window === "undefined") return {};
        try {
          const params = new URLSearchParams(window.location.search);
          const tmdb = params.get("tmdb") || "";
          const anthropic = params.get("anthropic") || "";
          const join = params.get("join") || "";
          if (tmdb || anthropic || join) {
            params.delete("tmdb"); params.delete("anthropic"); params.delete("join");
            const q = params.toString();
            const newUrl = window.location.pathname + (q ? "?" + q : "") + window.location.hash;
            window.history.replaceState({}, "", newUrl);
          }
          if (join) {
            try { localStorage.setItem("cp_householdId", join); } catch {}
          }
          return { tmdb, anthropic, join };
        } catch { return {}; }
      }, []);

      // Keys are now held server-side in Supabase edge function secrets. We keep
      // these state variables (and the "proxy" sentinel) so existing call sites
      // and `if (apiKey)` gates continue to work without per-line edits.
      const [apiKey, setApiKey] = useState("proxy");
      const [apiKeyInput, setApiKeyInput] = useState("");
      const [anthropicKey, setAnthropicKey] = useState("proxy");
      const [anthropicKeyInput, setAnthropicKeyInput] = useState("");
      const [screen, setScreen] = useState(() => {
        // API_SETUP screen is deprecated from the normal flow. It only appears if
        // explicitly requested via `?setup=1`. First-run users land on WELCOME and see
        // a small dev banner if keys are missing — set via URL params or cpSetKeys().
        try {
          const params = new URLSearchParams(window.location.search);
          if (params.get("setup") === "1") return S.API_SETUP;
          // Partner 2 joining via shared link → jump straight into their onboarding
          if (params.get("join")) return S.SETUP;
        } catch {}
        const restorable = [S.WELCOME, S.RECOMMENDATIONS, S.SESSION_PREFS];
        if (saved?.lastScreen && restorable.includes(saved.lastScreen)) return saved.lastScreen;
        return S.WELCOME;
      });
      const [history, setHistory] = useState([]);
      const [genreMap, setGenreMap] = useState({});

      const [currentUser, setCurrentUser] = useState(null);
      const [inputName1, setInputName1] = useState(saved?.profile1?.name || "");
      const [inputName2, setInputName2] = useState(saved?.profile2?.name || "");
      const [profile1, setProfile1] = useState(saved?.profile1 || { name: "", genres: [], favorites: [], dealbreakers: [], eraPrefs: [], pacePrefs: [] });
      const [profile2, setProfile2] = useState(saved?.profile2 || { name: "", genres: [], favorites: [], dealbreakers: [], eraPrefs: [], pacePrefs: [] });
      const [services, setServices] = useState(saved?.services || []);
      // Session prefs expire after 12 hours of inactivity — "tonight's vibe" is ephemeral
      const SESSION_PREFS_TTL = 12 * 60 * 60 * 1000;
      const [sessionPrefs, setSessionPrefs] = useState(() => {
        const empty = { contentType: [], mood: [], era: [] };
        if (!saved?.sessionPrefs) return empty;
        const ts = saved?.sessionPrefsTs || 0;
        if (ts && Date.now() - ts > SESSION_PREFS_TTL) return empty;
        return saved.sessionPrefs;
      });
      const [sessionPrefsTs, setSessionPrefsTs] = useState(() => {
        const ts = saved?.sessionPrefsTs || 0;
        if (ts && Date.now() - ts > SESSION_PREFS_TTL) return 0;
        return ts;
      });
      // Stamp the timestamp whenever prefs change (only if non-empty)
      useEffect(() => {
        const hasAny = sessionPrefs.contentType.length > 0 || sessionPrefs.mood.length > 0 || sessionPrefs.era.length > 0;
        setSessionPrefsTs(hasAny ? Date.now() : 0);
      }, [sessionPrefs]);

      const [categories, setCategories] = useState([]);
      const [loadingRecs, setLoadingRecs] = useState(false);
      const [selectedMovie, setSelectedMovie] = useState(null);
      const [chosenMovie, setChosenMovie] = useState(null);
      const BATCH_SIZE = 10; // initial items to show per row
      const [showCounts, setShowCounts] = useState({}); // { categoryIndex: visibleCount }
      const [feedbackOpen, setFeedbackOpen] = useState(false);
      const [feedbackText, setFeedbackText] = useState("");
      const [feedbackLoading, setFeedbackLoading] = useState(false);
      const [feedbackRow, setFeedbackRow] = useState(null); // { title, items } generated from feedback

      const [seen, setSeen] = useState([new Set(saved?.seen1 || []), new Set(saved?.seen2 || [])]);
      const [dismissed, setDismissed] = useState(new Set(saved?.dismissed || []));
      const [liked, setLiked] = useState([new Set(saved?.liked1 || []), new Set(saved?.liked2 || [])]);
      const [loved, setLoved] = useState([new Set(saved?.loved1 || []), new Set(saved?.loved2 || [])]); // per-person "must watch"
      const [likedGenres, setLikedGenres] = useState([saved?.likedGenres1 || {}, saved?.likedGenres2 || {}]); // per-person: [{ itemId: [genreIds] }, ...]
      const [nah, setNah] = useState([new Set(saved?.nah1 || []), new Set(saved?.nah2 || [])]); // per-person nah
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [showMoreServices, setShowMoreServices] = useState(false);
      const [handoffCopied, setHandoffCopied] = useState(false);
      // TODO: "Save across devices" login prompt — stub for future auth layer.
      // When we wire up Firebase/magic-link auth, trigger this once the user has
      // completed onboarding AND opened the recs screen ≥ N times. On dismiss,
      // set localStorage.cp_saveAcrossDismissed = timestamp so we don't nag.
      const [showSaveAcrossDevices, setShowSaveAcrossDevices] = useState(false);
      const [tasteDNA, setTasteDNA] = useState(null);
      const [tasteDNA1, setTasteDNA1] = useState(saved?.tasteDNA1 || null);
      const [tasteDNA2, setTasteDNA2] = useState(saved?.tasteDNA2 || null);
      const [analyzingDNA, setAnalyzingDNA] = useState(false);
      const [editingFromReview, setEditingFromReview] = useState(false);
      const [profileSnapshotRef] = useState({ current: null }); // snapshot of profile when entering edit
      const [reviewSnapshotRef] = useState({ current: null }); // snapshot when entering profile review
      const [vibePickerFav, setVibePickerFav] = useState(null); // which favorite is being vibe-tagged
      const [showProfileSheet, setShowProfileSheet] = useState(false);
      const [toastMsg, setToastMsg] = useState("");
      const [watchlist, setWatchlist] = useState(new Set(saved?.watchlist || []));
      const [watchlistItems, setWatchlistItems] = useState(saved?.watchlistItems || {});
      const [showWatchlist, setShowWatchlist] = useState(false);

      // Desktop viewport detection with resize listener
      const [isDesktop, setIsDesktop] = useState(window.innerWidth >= 768);
      useEffect(() => {
        const handler = () => setIsDesktop(window.innerWidth >= 768);
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);

      // ─── Dev console helpers for key bootstrapping (fresh browsers, testing)
      // Usage:
      //   cpSetKeys("eyJ...tmdb...", "sk-ant-...anthropic...")  — sets both
      //   cpSetKeys("eyJ...")                                   — sets tmdb only
      //   cpClearKeys()                                         — wipes both keys
      //   cpShowSetup()                                         — opens the legacy API_SETUP screen
      useEffect(() => {
        if (typeof window === "undefined") return;
        window.cpSetKeys = (tmdb, anthropic) => {
          if (tmdb) setApiKey(tmdb.trim());
          if (anthropic) setAnthropicKey(anthropic.trim());
          console.log("%c[Couch Potatoes] keys saved to localStorage", "color:#fb923c;font-weight:bold");
          return { tmdb: !!tmdb, anthropic: !!anthropic };
        };
        window.cpClearKeys = () => {
          setApiKey(""); setAnthropicKey("");
          console.log("%c[Couch Potatoes] keys cleared", "color:#fb923c;font-weight:bold");
        };
        window.cpShowSetup = () => setScreen(S.API_SETUP);
        return () => {
          try { delete window.cpSetKeys; delete window.cpClearKeys; delete window.cpShowSetup; } catch {}
        };
      }, []);

      // Save to localStorage on change
      useEffect(() => {
        if (apiKey) {
          saveData({
            apiKey, anthropicKey,
            profile1, profile2, services,
            seen1: [...seen[0]], seen2: [...seen[1]],
            dismissed: [...dismissed],
            liked1: [...liked[0]], liked2: [...liked[1]],
            loved1: [...loved[0]], loved2: [...loved[1]],
            likedGenres1: likedGenres[0], likedGenres2: likedGenres[1],
            nah1: [...nah[0]], nah2: [...nah[1]],
            tasteDNA1, tasteDNA2,
            watchlist: [...watchlist],
            watchlistItems: watchlistItems,
            sessionPrefs,
            sessionPrefsTs,
            lastScreen: screen,
          });
        }
      }, [apiKey, profile1, profile2, services, seen, dismissed, liked, loved, likedGenres, nah, tasteDNA1, tasteDNA2, watchlist, watchlistItems, sessionPrefs, sessionPrefsTs, screen]);

      // ─── Cloud sync (Supabase households table)
      // Resolve household id once on mount, then:
      //   1. Fetch existing row from Supabase and merge any partner fields we
      //      don't already have locally (so Partner 2 inherits Partner 1's setup).
      //   2. Subscribe to realtime updates so partner edits stream live.
      //   3. Mirror local profile/services/session changes back to Supabase.
      const householdIdRef = useRef(null);
      if (householdIdRef.current === null) {
        try { householdIdRef.current = getHouseholdId(); } catch { householdIdRef.current = "cp_demo"; }
      }
      const skipNextCloudSaveRef = useRef(false);
      // Per-tab client id so we can ignore realtime echoes of our own writes.
      // Without this, fast successive taps race the echo and earlier snapshots
      // clobber later local state ("the second pill doesn't stick" bug).
      const clientIdRef = useRef(null);
      if (clientIdRef.current === null) {
        clientIdRef.current = (window.crypto && window.crypto.randomUUID)
          ? window.crypto.randomUUID()
          : (Date.now() + "-" + Math.random().toString(36).slice(2));
      }

      // Helper: serialize per-person reaction state for the cloud (Sets → arrays)
      const serializeState = () => ({
        _clientId: clientIdRef.current,
        seen1: [...seen[0]], seen2: [...seen[1]],
        dismissed: [...dismissed],
        liked1: [...liked[0]], liked2: [...liked[1]],
        loved1: [...loved[0]], loved2: [...loved[1]],
        likedGenres1: likedGenres[0], likedGenres2: likedGenres[1],
        nah1: [...nah[0]], nah2: [...nah[1]],
        tasteDNA1, tasteDNA2,
        watchlist: [...watchlist],
        watchlistItems,
      });

      // Helper: hydrate per-person state from a remote `state` jsonb blob
      const hydrateState = (s) => {
        if (!s) return;
        skipNextCloudSaveRef.current = true;
        if (s.seen1 || s.seen2) setSeen([new Set(s.seen1 || []), new Set(s.seen2 || [])]);
        if (s.dismissed) setDismissed(new Set(s.dismissed));
        if (s.liked1 || s.liked2) setLiked([new Set(s.liked1 || []), new Set(s.liked2 || [])]);
        if (s.loved1 || s.loved2) setLoved([new Set(s.loved1 || []), new Set(s.loved2 || [])]);
        if (s.likedGenres1 || s.likedGenres2) setLikedGenres([s.likedGenres1 || {}, s.likedGenres2 || {}]);
        if (s.nah1 || s.nah2) setNah([new Set(s.nah1 || []), new Set(s.nah2 || [])]);
        if (s.tasteDNA1) setTasteDNA1(s.tasteDNA1);
        if (s.tasteDNA2) setTasteDNA2(s.tasteDNA2);
        if (s.watchlist) setWatchlist(new Set(s.watchlist));
        if (s.watchlistItems) setWatchlistItems(s.watchlistItems);
      };

      useEffect(() => {
        const id = householdIdRef.current;
        if (!id) return;
        let cancelled = false;
        (async () => {
          const remote = await cloudLoadHousehold(id);
          if (cancelled || !remote) return;
          // Merge: only adopt remote profile fields when the local slot is empty.
          // This way Partner 2 joining via ?join={id} inherits Partner 1's shared
          // services/profile1, but a returning user doesn't get clobbered.
          skipNextCloudSaveRef.current = true;
          if (remote.profile1 && !profile1.name) setProfile1(remote.profile1);
          if (remote.profile2 && !profile2.name) setProfile2(remote.profile2);
          if (remote.services && (!services || services.length === 0)) setServices(remote.services);
          if (remote.session_prefs &&
              !(sessionPrefs.contentType.length || sessionPrefs.mood.length || sessionPrefs.era.length)) {
            setSessionPrefs(remote.session_prefs);
          }
          // Per-person reaction state: adopt remote whenever it exists. The local
          // copy is just a cache; remote is the source of truth across devices.
          if (remote.state) hydrateState(remote.state);
        })();
        // Realtime: partner edits push into our local state
        const unsub = cloudSubscribeHousehold(id, (row) => {
          // Ignore echoes of our own writes — otherwise an in-flight save can
          // overwrite a tap that happened in between save and echo arrival.
          if (row.state && row.state._clientId === clientIdRef.current) return;
          skipNextCloudSaveRef.current = true;
          if (row.profile1) setProfile1(p => row.profile1.name ? row.profile1 : p);
          if (row.profile2) setProfile2(p => row.profile2.name ? row.profile2 : p);
          if (row.services) setServices(row.services);
          if (row.session_prefs) setSessionPrefs(row.session_prefs);
          if (row.state) hydrateState(row.state);
        });
        return () => { cancelled = true; unsub && unsub(); };
      }, []);

      // Push local profile/services/session/state changes up to Supabase (debounced)
      useEffect(() => {
        const id = householdIdRef.current;
        if (!id) return;
        if (skipNextCloudSaveRef.current) {
          skipNextCloudSaveRef.current = false;
          return;
        }
        cloudSaveHousehold(id, {
          profile1, profile2, services, sessionPrefs,
          state: serializeState(),
        });
      }, [profile1, profile2, services, sessionPrefs,
          seen, dismissed, liked, loved, likedGenres, nah,
          tasteDNA1, tasteDNA2, watchlist, watchlistItems]);

      // Load genres when API key is set
      useEffect(() => {
        if (apiKey) {
          fetchGenres(apiKey).then(setGenreMap).catch(() => {});
        }
      }, [apiKey]);

      // Snapshot profile when entering review screen
      useEffect(() => {
        if (screen === S.PROFILE_REVIEW) {
          reviewSnapshotRef.current = JSON.stringify(currentProfile);
        }
      }, [screen === S.PROFILE_REVIEW]);

      const goTo = (s) => {
        setHistory(h => [...h, screen]);
        setScreen(s);
        try { window.history.pushState({ screen: s }, ""); } catch {}
      };
      const goBack = () => {
        if (history.length) {
          setScreen(history[history.length - 1]);
          setHistory(h => h.slice(0, -1));
        }
      };

      // Browser back button support
      useEffect(() => {
        const handlePopState = (e) => {
          // Close any open overlays first
          if (showProfileSheet) { setShowProfileSheet(false); return; }
          if (vibePickerFav) { setVibePickerFav(null); return; }
          if (showWatchlist) { setShowWatchlist(false); return; }
          if (showResetConfirm) { setShowResetConfirm(false); return; }
          if (selectedMovie) { setSelectedMovie(null); return; }
          // Otherwise navigate back in app history
          if (history.length > 0) {
            setScreen(history[history.length - 1]);
            setHistory(h => h.slice(0, -1));
          }
        };
        window.addEventListener("popstate", handlePopState);
        // Push initial state so first back doesn't leave the site
        if (!window.history.state?.screen) {
          try { window.history.replaceState({ screen }, ""); } catch {}
        }
        return () => window.removeEventListener("popstate", handlePopState);
      }, [history, screen, showProfileSheet, vibePickerFav, showWatchlist, showResetConfirm, selectedMovie]);
      const editSection = (sectionScreen) => { setEditingFromReview(true); profileSnapshotRef.current = JSON.stringify(currentProfile); goTo(sectionScreen); };
      const returnToReview = async () => {
        setEditingFromReview(false);
        setAnalyzingDNA(true); setTasteDNA(null);
        goBack(); // returns to PROFILE_REVIEW which is on the history stack
        try {
          const dna = await analyzeTasteDNA(apiKey, currentProfile, genreMap, anthropicKey);
          setTasteDNA(dna);
          if (currentUser === 1) setTasteDNA1(dna); else setTasteDNA2(dna);
        } catch (e) { console.error("DNA error:", e); const dnaError = { traits: [], paragraph: "Couldn't analyze — try adding more favorites.", vibe: "Mystery" }; setTasteDNA(dnaError); if (currentUser === 1) setTasteDNA1(dnaError); else setTasteDNA2(dnaError); }
        setAnalyzingDNA(false);
      };
      const toggle = (arr, val) => arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val];

      // Lightweight, genre-only Taste DNA preview — runs locally, no Claude call
      // Scores each "leaning" by how many of its underlying genres are picked,
      // so adding more genres to an existing bucket strengthens it, and new buckets
      // can displace weaker ones. No fixed-order slicing bugs.
      const getEarlyTasteRead = (genreIds) => {
        if (!genreIds || genreIds.length < 2) return "";
        const s = new Set(genreIds);
        const buckets = [
          { label: "tense, character-driven", ids: [53, 80, 9648] },      // Thriller / Crime / Mystery
          { label: "high-energy, cinematic",  ids: [28, 12, 10752] },     // Action / Adventure / War
          { label: "sharp, funny",            ids: [35] },                // Comedy
          { label: "emotionally rich",        ids: [18] },                // Drama
          { label: "dark and unsettling",     ids: [27] },                // Horror
          { label: "imaginative, world-building", ids: [878, 14] },       // Sci-Fi / Fantasy
          { label: "warm, heartfelt",         ids: [10749] },             // Romance
          { label: "thoughtful, real-world",  ids: [99] },                // Documentary
          { label: "playful, imaginative",    ids: [16, 10751, 99916] },  // Animation / Family / Anime
          { label: "off the beaten path",     ids: [99917, 37] },         // Foreign / Western
          { label: "music-driven",            ids: [10402] },             // Music
          { label: "history-soaked",          ids: [36] },                // History
        ];
        const scored = buckets
          .map(b => ({ label: b.label, score: b.ids.filter(id => s.has(id)).length }))
          .filter(b => b.score > 0)
          .sort((a, b) => b.score - a.score);
        if (scored.length === 0) return "";
        const fmt = (l) => `<strong class='text-white'>${l}</strong>`;
        const picked = scored.slice(0, 3).map(b => fmt(b.label));
        if (picked.length === 1) return `You're leaning into ${picked[0]} stories. Add a couple more to sharpen this.`;
        if (picked.length === 2) return `You're leaning into ${picked[0]} and ${picked[1]} stories.`;
        return `You're leaning into ${picked[0]}, ${picked[1]}, and ${picked[2]} stories.`;
      };

      // Dynamic profile-strength % for the genres step.
      // Genres alone cap around 35% — favorites + fine-tune fill the rest.
      const getGenreStageStrength = (genreIds) => {
        const n = (genreIds || []).length;
        if (n === 0) return 0;
        if (n === 1) return 8;
        if (n === 2) return 15;
        if (n === 3) return 22;
        if (n === 4) return 28;
        if (n <= 6) return 32;
        return 35;
      };

      const toggleVibeTag = (favId, vibeId) => {
        setCurrentProfile(p => {
          const vibeTags = { ...(p.vibeTags || {}) };
          const current = vibeTags[favId] || [];
          vibeTags[favId] = current.includes(vibeId) ? current.filter(v => v !== vibeId) : [...current, vibeId];
          if (vibeTags[favId].length === 0) delete vibeTags[favId];
          return { ...p, vibeTags };
        });
      };

      const toggleSeen = (partnerIdx, movieId) => {
        setSeen(prev => {
          const next = [...prev];
          const s = new Set(next[partnerIdx]);
          if (s.has(movieId)) s.delete(movieId); else s.add(movieId);
          next[partnerIdx] = s;
          return next;
        });
      };

      const currentProfile = currentUser === 1 ? profile1 : profile2;
      // Solo mode: we have a primary profile but no second partner yet. Lots of copy
      // flips on this ("our" → "my", "for you two" → "for you", etc.) and the empty
      // chair prompts key off of it too.
      const isSolo = !(profile2.genres && profile2.genres.length > 0);
      const setCurrentProfile = currentUser === 1 ? setProfile1 : setProfile2;

      // Build recommendations
      const fetchRecommendations = useCallback(async () => {
        if (!apiKey) return;
        setLoadingRecs(true);
        setCategories([]);
        setShowCounts({});

        try {
          const sharedGenres = profile1.genres.filter(g => profile2.genres.includes(g));
          const allGenres = [...new Set([...profile1.genres, ...profile2.genres])];
          const selectedMoods = sessionPrefs.mood;
          const selectedEras = sessionPrefs.era.length > 0 && !sessionPrefs.era.includes("any") ? sessionPrefs.era : [];
          const contentTypes = sessionPrefs.contentType;
          const wantMovies = contentTypes.length === 0 || contentTypes.includes("movies") || contentTypes.includes("either");
          const wantTV = contentTypes.length === 0 || contentTypes.includes("tv") || contentTypes.includes("either");

          // Build date range from eras
          let minYear = 1900, maxYear = 2026;
          if (selectedEras.length > 0) {
            const eraConfigs = selectedEras.map(e => ERAS.find(er => er.id === e)).filter(Boolean);
            minYear = Math.min(...eraConfigs.map(e => e.min));
            maxYear = Math.max(...eraConfigs.map(e => e.max));
          }

          const cats = [];
          const seenIds = new Set();

          const dedup = (items) => items.filter(item => {
            if (seenIds.has(item.id)) return false;
            seenIds.add(item.id);
            return true;
          });

          // Anime vs Animation: check if either user selected the virtual "Anime" genre (99916)
          const wantsAnime = allGenres.includes(99916);
          const wantsAnimation = allGenres.includes(16);
          // Filter logic: if user picked Animation but NOT Anime, exclude Japanese-language animation
          // If user picked Anime but NOT Animation, only show Japanese-language animation for that genre
          // If both, show everything
          const filterAnime = (results) => {
            if (wantsAnime && wantsAnimation) return results; // both selected, show all
            if (wantsAnime && !wantsAnimation) return results.filter(r => !(r.genre_ids || []).includes(16) || r.original_language === "ja");
            // Default: filter out anime
            return results.filter(r => r.original_language !== "ja");
          };

          // Plural genre labels for natural language
          const GENRE_PLURAL = {
            28: "action films", 12: "adventures", 16: "animation", 99916: "anime", 35: "comedies",
            80: "crime stories", 99: "documentaries", 18: "dramas", 10751: "family films",
            14: "fantasy", 99917: "foreign films", 36: "historical films", 27: "horror", 10402: "musicals",
            9648: "mysteries", 10749: "romance", 878: "sci-fi", 53: "thrillers",
            10752: "war films", 37: "westerns", 10759: "action & adventure",
            10765: "sci-fi & fantasy",
          };

          // Helper to discover both movies + TV
          // Automatically includes keyword exclusions from dealbreakers (gore, slasher, etc.)
          const discoverBoth = async (params, extraTVParams, pages = 2) => {
            const baseParams = { ...params };
            // Merge keyword exclusions: combine dealbreaker keywords with any already in params
            if (excludeKeywordsStr) {
              baseParams.without_keywords = baseParams.without_keywords
                ? `${baseParams.without_keywords}|${excludeKeywordsStr}`
                : excludeKeywordsStr;
            }
            const promises = [];
            if (wantMovies) promises.push(discover(apiKey, "movie", {
              ...baseParams,
              "primary_release_date.gte": `${minYear}-01-01`,
              "primary_release_date.lte": `${maxYear}-12-31`,
            }, pages).then(r => r.map(m => ({ ...m, media_type: "movie" }))));
            if (wantTV) promises.push(discover(apiKey, "tv", {
              ...baseParams, ...extraTVParams,
              "first_air_date.gte": `${minYear}-01-01`,
              "first_air_date.lte": `${maxYear}-12-31`,
            }, pages).then(r => r.map(m => ({ ...m, media_type: "tv" }))));
            return (await Promise.all(promises)).flat();
          };

          // Map virtual genre IDs to real TMDB genre IDs for API calls
          const toTmdbGenre = (gid) => gid === 99916 ? 16 : gid === 99917 ? null : gid; // 99916=Anime→Animation, 99917=Foreign→null (handled via language filter)
          const tmdbSharedGenres = sharedGenres.map(toTmdbGenre).filter(Boolean);

          // Collect genre data for scoring — favorites-derived genres are the STRONG signal
          const profile1SelectedGenres = new Set(profile1.genres.map(toTmdbGenre).filter(Boolean));
          const profile2SelectedGenres = new Set(profile2.genres.map(toTmdbGenre).filter(Boolean));

          // Build weighted genre maps from favorites (much stronger signal than checkbox genres)
          const p1FavGenreFreq = {};
          (profile1.favorites || []).forEach(f => {
            (f.genre_ids || []).forEach(g => { p1FavGenreFreq[g] = (p1FavGenreFreq[g] || 0) + 1; });
          });
          const p2FavGenreFreq = {};
          (profile2.favorites || []).forEach(f => {
            (f.genre_ids || []).forEach(g => { p2FavGenreFreq[g] = (p2FavGenreFreq[g] || 0) + 1; });
          });

          // Build a "flavor profile" from previously liked items' genres (per person)
          // Tiered weights: 2.0 for loved, 1.0 for "seen + liked", 0.3 for "liked but not seen"
          const p1LikedGenreFreq = {};
          Object.entries(likedGenres[0] || {}).forEach(([itemId, genres]) => {
            const itemIdNum = parseInt(itemId);
            const weight = loved[0].has(itemIdNum) ? 2.0 : seen[0].has(itemIdNum) ? 1.0 : 0.3;
            (genres || []).forEach(g => { p1LikedGenreFreq[g] = (p1LikedGenreFreq[g] || 0) + weight; });
          });
          const p2LikedGenreFreq = {};
          Object.entries(likedGenres[1] || {}).forEach(([itemId, genres]) => {
            const itemIdNum = parseInt(itemId);
            const weight = loved[1].has(itemIdNum) ? 2.0 : seen[1].has(itemIdNum) ? 1.0 : 0.3;
            (genres || []).forEach(g => { p2LikedGenreFreq[g] = (p2LikedGenreFreq[g] || 0) + weight; });
          });
          const hasLikeHistory1 = Object.keys(p1LikedGenreFreq).length > 0;
          const hasLikeHistory2 = Object.keys(p2LikedGenreFreq).length > 0;
          const hasFavorites1 = Object.keys(p1FavGenreFreq).length > 0;
          const hasFavorites2 = Object.keys(p2FavGenreFreq).length > 0;

          // ── VIBE FINGERPRINT — aggregate vibes users tagged on their favorites ──
          const buildVibeProfile = (profile) => {
            const vibeFreq = {};
            const tags = profile.vibeTags || {};
            Object.values(tags).forEach(vibes => {
              vibes.forEach(v => { vibeFreq[v] = (vibeFreq[v] || 0) + 1; });
            });
            return vibeFreq;
          };
          const p1VibeProfile = buildVibeProfile(profile1);
          const p2VibeProfile = buildVibeProfile(profile2);
          const hasVibes1 = Object.keys(p1VibeProfile).length > 0;
          const hasVibes2 = Object.keys(p2VibeProfile).length > 0;

          // ── DEALBREAKER HELPER ──
          const combinedDealbreakers = [...new Set([...(profile1.dealbreakers || []), ...(profile2.dealbreakers || [])])];
          const dealbreakersMap = {};
          combinedDealbreakers.forEach(db => {
            const opt = DEALBREAKER_OPTIONS.find(o => o.id === db);
            if (opt) dealbreakersMap[db] = opt;
          });

          // Collect all keyword exclusions from dealbreakers → passed to TMDB discover as without_keywords
          const dealbreakKeywordExcludes = new Set();
          Object.values(dealbreakersMap).forEach(opt => {
            (opt.keywordExclude || []).forEach(k => dealbreakKeywordExcludes.add(k));
          });
          const excludeKeywordsStr = dealbreakKeywordExcludes.size > 0 ? [...dealbreakKeywordExcludes].join("|") : "";

          const passesDealbreakers = (item) => {
            const itemGenres = new Set(item.genre_ids || []);
            for (const [id, opt] of Object.entries(dealbreakersMap)) {
              if (opt.genreExclude && opt.genreExclude.some(g => itemGenres.has(g))) return false;
              if (opt.languageFilter === "en" && item.original_language !== "en") return false;
              if (opt.languageFilter === "not-ja" && item.original_language === "ja") return false;
            }
            return true;
          };

          // Global mood filter — smart genre filtering based on mood
          // alwaysExclude genres are hard-blocked no matter what (e.g. horror for "light")
          // clashing genres are only blocked if the item has NO mood-boosting genres
          // So [Crime, Comedy] passes "light" (Comedy is a boost), but [Crime, Drama] fails
          const moodAlwaysExclude = new Set();
          const moodBoostGenres = new Set();
          const moodClashGenres = new Set();
          selectedMoods.forEach(m => {
            const mg = MOOD_GENRES[m];
            if (!mg) return;
            (mg.alwaysExclude || []).forEach(g => moodAlwaysExclude.add(g));
            (mg.boost || []).forEach(g => moodBoostGenres.add(g));
            (mg.clashing || []).forEach(g => moodClashGenres.add(g));
          });
          // For backward compat: moodHardExcludes used by time-contextual row
          const moodHardExcludes = moodAlwaysExclude;
          const passesMoodFilter = (item) => {
            if (selectedMoods.length === 0) return true;
            const itemGenres = item.genre_ids || [];
            // Always-exclude genres are hard blocked
            if (itemGenres.some(g => moodAlwaysExclude.has(g))) return false;
            // If the item has at least one mood-boosting genre, it passes
            // (this lets Crime+Comedy through for "light" mood)
            const hasBoostGenre = itemGenres.some(g => moodBoostGenres.has(g));
            if (hasBoostGenre) return true;
            // If no boost genre AND has clashing genres → block
            const hasClashGenre = itemGenres.some(g => moodClashGenres.has(g));
            if (hasClashGenre) return false;
            // Neutral item (no boost, no clash) — let through but it'll score low
            return true;
          };

          // Solo mode: only one profile exists. The couple-mode scoring below uses
          // Math.min(p1, p2) as its strongest weight, which always evaluates to 0 when
          // the second profile is empty — making solo recs feel random. In solo mode
          // we instead use the single profile's score directly at the same weight.
          const isSoloRun = !(profile2.genres && profile2.genres.length > 0);

          const scoreForCouple = (item) => {
            let score = 0;
            const itemGenres = new Set(item.genre_ids || []);

            // ── Favorites-derived genre match (STRONG signal, 4x weight) ──
            // These are genres from movies/shows the user specifically chose as favorites
            let p1FavScore = 0, p2FavScore = 0;
            if (hasFavorites1) {
              for (const g of itemGenres) {
                if (p1FavGenreFreq[g]) p1FavScore += Math.min(p1FavGenreFreq[g], 3);
              }
            }
            if (hasFavorites2) {
              for (const g of itemGenres) {
                if (p2FavGenreFreq[g]) p2FavScore += Math.min(p2FavGenreFreq[g], 3);
              }
            }
            if (isSoloRun) {
              // Single-profile mode: weight the lone favorites score at the full 4x
              score += p1FavScore * 4;
              score += p1FavScore * 1.5;
            } else {
              // Couple mode: reward mutual favorites-genre overlap most
              score += Math.min(p1FavScore, p2FavScore) * 4;
              score += (p1FavScore + p2FavScore) * 1.5;
            }

            // ── Selected genre match (lighter signal, 1x weight) ──
            // These are the genre checkboxes — useful but less definitive
            const p1SelOverlap = [...itemGenres].filter(g => profile1SelectedGenres.has(g)).length;
            const p2SelOverlap = [...itemGenres].filter(g => profile2SelectedGenres.has(g)).length;
            if (isSoloRun) {
              score += p1SelOverlap * 1;
              score += p1SelOverlap * 0.5;
            } else {
              score += Math.min(p1SelOverlap, p2SelOverlap) * 1;
              score += (p1SelOverlap + p2SelOverlap) * 0.5;
            }

            // Quality bonus
            const rating = item.vote_average || 0;
            const votes = item.vote_count || 0;
            if (rating >= 8.0 && votes >= 500) score += 3;
            else if (rating >= 7.0 && votes >= 200) score += 2;
            else if (rating >= 6.5) score += 1;

            // Popularity factor (logarithmic so blockbusters don't dominate)
            score += Math.min(Math.log10(item.popularity || 1), 3);

            // "Flavor" boost from previously liked items — genres you've liked before get a boost
            if (hasLikeHistory1) {
              let flavorScore = 0;
              for (const g of itemGenres) {
                if (p1LikedGenreFreq[g]) {
                  flavorScore += Math.min(p1LikedGenreFreq[g], 3); // cap per-genre boost at 3
                }
              }
              score += flavorScore * 0.5; // gentle influence, not overwhelming
            }
            if (hasLikeHistory2) {
              let flavorScore = 0;
              for (const g of itemGenres) {
                if (p2LikedGenreFreq[g]) {
                  flavorScore += Math.min(p2LikedGenreFreq[g], 3); // cap per-genre boost at 3
                }
              }
              score += flavorScore * 0.5; // gentle influence, not overwhelming
            }

            // ── Era preference boost ──
            const itemYear = parseInt((item.release_date || item.first_air_date || "").slice(0, 4));
            if (itemYear && !isNaN(itemYear)) {
              let eraScore = 0;
              const p1Eras = profile1.eraPrefs || [];
              const p2Eras = profile2.eraPrefs || [];
              const allEraPrefs = [...p1Eras, ...p2Eras];
              for (const eraId of allEraPrefs) {
                const era = PROFILE_ERAS.find(e => e.id === eraId);
                if (era && itemYear >= era.min && itemYear <= era.max) eraScore += 1.5;
              }
              score += eraScore;
            }

            // ── Pace preference boost ──
            const allPacePrefs = [...new Set([...(profile1.pacePrefs || []), ...(profile2.pacePrefs || [])])];
            const PACE_GENRE_MAP = {
              fast: { boost: [28, 12, 53], penalize: [18, 99] },
              steady: { boost: [18, 80, 9648], penalize: [] },
              slow: { boost: [18, 878, 36], penalize: [28, 12] },
              funny: { boost: [35, 10751], penalize: [27, 53] },
              heavy: { boost: [18, 10749], penalize: [35, 10751] },
              thrilling: { boost: [53, 27, 80, 9648], penalize: [10749, 10751] },
            };
            for (const paceId of allPacePrefs) {
              const paceMap = PACE_GENRE_MAP[paceId];
              if (paceMap) {
                for (const g of itemGenres) {
                  if (paceMap.boost.includes(g)) score += 1;
                  if (paceMap.penalize.includes(g)) score -= 0.5;
                }
              }
            }

            // ── Recency bias from implicit signals ──
            if (itemYear && !isNaN(itemYear)) {
              const dna1 = tasteDNA1;
              const dna2 = tasteDNA2;
              if (dna1?.recencyBias === "modern-leaning" && itemYear >= 2015) score += 1;
              if (dna1?.recencyBias === "classic-leaning" && itemYear < 2000) score += 1;
              if (dna2?.recencyBias === "modern-leaning" && itemYear >= 2015) score += 1;
              if (dna2?.recencyBias === "classic-leaning" && itemYear < 2000) score += 1;
            }

            // ── VIBE FINGERPRINT scoring ──
            // Match item's likely vibes (from genre→vibe mapping) against user's tagged vibes
            if (hasVibes1 || hasVibes2) {
              const itemVibeScores = {};
              for (const g of itemGenres) {
                (VIBE_GENRE_MAP[g] || []).forEach(v => {
                  itemVibeScores[v] = (itemVibeScores[v] || 0) + 1;
                });
              }
              // Score overlap between item's inferred vibes and each user's explicit vibe preferences
              let vibeBoost = 0;
              for (const [vibeId, strength] of Object.entries(itemVibeScores)) {
                if (hasVibes1 && p1VibeProfile[vibeId]) vibeBoost += Math.min(p1VibeProfile[vibeId], 3) * 1.5;
                if (hasVibes2 && p2VibeProfile[vibeId]) vibeBoost += Math.min(p2VibeProfile[vibeId], 3) * 1.5;
              }
              score += vibeBoost;
            }

            // ── MOOD scoring (DOMINANT signal — this is what they want RIGHT NOW) ──
            // Items with mood-boosting genres get rewarded. Items with clashing genres
            // get penalized, but less so if they ALSO have a boost genre (e.g. Crime+Comedy for "light").
            if (selectedMoods.length > 0) {
              let moodBoostCount = 0;
              let moodClashCount = 0;
              for (const moodId of selectedMoods) {
                const mg = MOOD_GENRES[moodId];
                if (!mg) continue;
                for (const g of itemGenres) {
                  if (mg.boost.includes(g)) moodBoostCount++;
                  if (mg.clashing.includes(g)) moodClashCount++;
                  if (mg.alwaysExclude?.includes(g)) score -= 200; // hard kill
                }
              }
              if (moodBoostCount > 0 && moodClashCount === 0) {
                // Pure mood match — strong bonus
                score += moodBoostCount * 4;
              } else if (moodBoostCount > 0 && moodClashCount > 0) {
                // Mixed but has mood-matching genres — net positive but tempered
                // e.g. Crime+Comedy for "light": comedy boosts, crime is mild drag
                score += (moodBoostCount * 3) - (moodClashCount * 2);
